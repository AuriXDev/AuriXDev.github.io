<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lume | Casino Game</title>
    <style>
        :root {
            --toxic: #00ff64;
            --toxic-dim: #00cc50;
            --toxic-glow: rgba(0, 255, 100, 0.3);
            --toxic-glow-strong: rgba(0, 255, 100, 0.6);
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --loss-red: #ff0040;
            --loss-red-glow: rgba(255, 0, 64, 0.5);
            --transition-speed: 0.4s;
            --wheel-red: #c0392b;
            --wheel-black: #1e272e;
            --wheel-white: #f0f0f0;
        }

        [data-theme="dark"] {
            --bg-primary: #050505;
            --bg-secondary: #0f0f0f;
            --bg-card: rgba(20, 20, 20, 0.8);
            --bg-card-solid: #141414;
            --bg-input: #1a1a1a;
            --bg-tab: #1a1a1a;
            --bg-tab-active: var(--toxic);
            --text-primary: var(--toxic);
            --text-secondary: #00cc50;
            --text-muted: #444;
            --text-on-active: #000;
            --border-color: rgba(0, 255, 100, 0.15);
            --border-active: var(--toxic);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.6);
            --shadow-neon: 0 0 10px var(--toxic-glow), 0 0 30px rgba(0, 255, 100, 0.1);
            --slot-bg: #111;
            --slot-border: #333;
            --mine-safe: #1a3322;
            --mine-mine: #331111;
            --scrollbar-track: #111;
            --scrollbar-thumb: #333;
            --rb-red-bg: linear-gradient(135deg, #e74c3c, #c0392b);
            --rb-black-bg: linear-gradient(135deg, #2c3e50, #1a1a2e);
            --rb-white-bg: linear-gradient(135deg, #ffffff, #e0e0e0);
            --reel-shadow-top: linear-gradient(to bottom, #050505 0%, transparent 100%);
            --reel-shadow-bottom: linear-gradient(to top, #050505 0%, transparent 100%);
            --nav-bg: rgba(20, 20, 20, 0.9);
        }

        [data-theme="light"] {
            --bg-primary: #f0f0f0;
            --bg-secondary: #e8e8e8;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-solid: #ffffff;
            --bg-input: #e0e0e0;
            --bg-tab: #e0e0e0;
            --bg-tab-active: var(--toxic);
            --text-primary: #00b848;
            --text-secondary: #009938;
            --text-muted: #888;
            --text-on-active: #000;
            --border-color: rgba(0, 180, 70, 0.2);
            --border-active: #00cc50;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.1);
            --shadow-neon: 0 0 10px rgba(0, 255, 100, 0.2), 0 0 30px rgba(0, 255, 100, 0.05);
            --slot-bg: #f5f5f5;
            --slot-border: #ccc;
            --mine-safe: #d4edda;
            --mine-mine: #f8d7da;
            --scrollbar-track: #ddd;
            --scrollbar-thumb: #bbb;
            --rb-red-bg: linear-gradient(135deg, #ff6b6b, #e74c3c);
            --rb-black-bg: linear-gradient(135deg, #34495e, #2c3e50);
            --rb-white-bg: linear-gradient(135deg, #ffffff, #cccccc);
            --reel-shadow-top: linear-gradient(to bottom, #f0f0f0 0%, transparent 100%);
            --reel-shadow-bottom: linear-gradient(to top, #f0f0f0 0%, transparent 100%);
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            transition: background var(--transition-speed) ease;
            position: fixed;
            top: 0;
            left: 0;
        }

        .casino-phone {
            width: 100%;
            max-width: 460px;
            height: 100vh;
            max-height: 920px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-card);
            border-radius: 36px;
            border: 3px solid var(--border-color);
            overflow: hidden;
            position: relative;
            transition: all var(--transition-speed) ease;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
            flex-shrink: 0;
            padding: 0 8px;
            margin-top: 12px;
        }

        .balance-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 10px 16px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(10px);
            flex: 1;
            text-align: center;
        }

        .record-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 8px 14px;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-primary);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .game-tabs-wrapper {
            display: flex;
            gap: 4px;
            padding: 8px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .game-tab {
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            margin: auto;
        }

        .game-tab.active {
            background: var(--toxic);
            color: #000;
            border-color: var(--toxic);
            box-shadow: 0 0 8px var(--toxic-glow);
        }

        .game-scroll-area {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding-right: 4px;
            padding-bottom: 20px;
            margin-top: 100px;
        }

        .game-scroll-area::-webkit-scrollbar {
            width: 3px;
        }
        .game-scroll-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .game-scroll-area::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        .content-section {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .content-section.active {
            display: flex;
        }

        .section-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .section-footer {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            background: var(--bg-secondary);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 60px;
            background: var(--nav-bg);
            border-top: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            z-index: 100;
            flex-shrink: 0;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-primary);
            cursor: pointer;
            padding: 10px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
        }

        .nav-btn.active {
            color: var(--toxic);
            text-shadow: 0 0 10px var(--toxic-glow);
        }

        .nav-btn.play-btn {
            font-size: 1.8rem;
        }

        /* Игровые панели */
        .game-panel {
            display: none;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 12px;
            animation: panelFadeIn 0.3s ease;
            padding: 0 8px;
        }

        @keyframes panelFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-panel.active {
            display: flex;
        }

        /* 3D REEL STYLES */
        .reels-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
            perspective: 600px;
        }

        .reels-row.slots5-row {
            gap: 5px;
        }

        .reel-outer {
            width: 66px;
            height: 135px;
            position: relative;
            border-radius: 14px;
            background: var(--slot-bg);
            border: 2px solid var(--slot-border);
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .reels-row.slots5-row .reel-outer {
            width: 52px;
            height: 118px;
            border-radius: 12px;
        }

        .reel-window {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .reel-cylinder {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-style: preserve-3d;
            transform-origin: 50% 50%;
            will-change: transform;
        }

        .reel-face {
            position: absolute;
            width: 100%;
            height: 72px;
            top: 50%;
            left: 0;
            margin-top: -36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            color: var(--text-primary);
            background: var(--slot-bg);
            border-radius: 8px;
            text-shadow: 0 0 4px rgba(0,0,0,0.3);
        }

        .reels-row.slots5-row .reel-face {
            height: 58px;
            margin-top: -29px;
            font-size: 26px;
            border-radius: 6px;
        }

        .reel-shadow-top, .reel-shadow-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 32px;
            z-index: 5;
            pointer-events: none;
        }

        .reels-row.slots5-row .reel-shadow-top,
        .reels-row.slots5-row .reel-shadow-bottom {
            height: 26px;
        }

        .reel-shadow-top {
            top: 0;
            background: var(--reel-shadow-top);
        }

        .reel-shadow-bottom {
            bottom: 0;
            background: var(--reel-shadow-bottom);
        }

        .reel-outer.spinning-reel {
            border-color: var(--toxic) !important;
            box-shadow: 0 0 18px var(--toxic-glow);
        }

        .reel-outer.win-highlight {
            border-color: var(--toxic) !important;
            box-shadow: 0 0 22px var(--toxic), 0 0 50px var(--toxic-glow-strong);
            animation: reelWinGlow 3s ease-out forwards;
        }

        @keyframes reelWinGlow {
            0% { border-color: var(--toxic); box-shadow: 0 0 22px var(--toxic), 0 0 50px var(--toxic-glow-strong); }
            50% { border-color: var(--toxic); box-shadow: 0 0 22px var(--toxic), 0 0 50px var(--toxic-glow-strong); }
            100% { border-color: var(--slot-border); box-shadow: none; }
        }

        .slot-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .slot-icon {
            width: 52px;
            height: 62px;
            background: var(--slot-bg);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 2px solid var(--slot-border);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .slot-icon.win-highlight {
            border-color: var(--toxic) !important;
            box-shadow: 0 0 18px var(--toxic), 0 0 40px var(--toxic-glow-strong);
            animation: winHighlightAnim 3s ease-out forwards;
        }

        @keyframes winHighlightAnim {
            0% { border-color: var(--toxic); box-shadow: 0 0 18px var(--toxic), 0 0 40px var(--toxic-glow-strong); }
            50% { border-color: var(--toxic); box-shadow: 0 0 18px var(--toxic), 0 0 40px var(--toxic-glow-strong); }
            100% { border-color: var(--slot-border); box-shadow: none; }
        }

        .slot-icon.spinning {
            animation: slotShake 0.08s infinite;
        }

        @keyframes slotShake {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .bet-btn {
            width: 80%;
            padding: 13px;
            background: var(--toxic);
            border: none;
            border-radius: 24px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            color: #000;
            margin-top: 10px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            margin-top: 150px;
            margin-left: auto;
            margin-right: auto;
        }

        .bet-btn:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--toxic-glow-strong), 0 4px 15px rgba(0,0,0,0.3);
            transform: translateY(-1px);
        }

        .bet-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        .bet-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
        }

        .bet-adj-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 1.5px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .bet-adj-btn:disabled {
            background: #222;
            border-color: #333;
            color: #555;
            cursor: not-allowed;
        }

        .bet-display {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 8px 16px;
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            min-width: 80px;
            text-align: center;
            cursor: pointer;
        }

        .bet-input {
            background: transparent;
            border: none;
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            width: 100%;
            outline: none;
        }

        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 14px 0;
        }

        .wheel {
            width: 195px;
            height: 195px;
            border-radius: 50%;
            background: conic-gradient(var(--wheel-white) 0deg 40deg,
            var(--wheel-red) 40deg 80deg,
            var(--wheel-black) 80deg 120deg,
            var(--wheel-red) 120deg 160deg,
            var(--wheel-black) 160deg 200deg,
            var(--wheel-red) 200deg 240deg,
            var(--wheel-black) 240deg 280deg,
            var(--wheel-red) 280deg 320deg,
            var(--wheel-black) 320deg 360deg);
            border: 5px solid var(--gold);
            box-shadow: 0 0 20px var(--gold-glow);
            transition: transform 0.3s ease-out;
        }

        .arrow {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: var(--gold);
            filter: drop-shadow(0 0 6px var(--gold-glow));
            z-index: 10;
            pointer-events: none;
        }

        .color-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 14px 0;
            flex-wrap: wrap;
        }

        .color-card {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            border: 3px solid transparent;
            color: white;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .color-card:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .color-card.red-card {
            background: var(--rb-red-bg);
        }

        .color-card.black-card {
            background: var(--rb-black-bg);
            border-color: #555;
        }

        .color-card.white-card {
            background: var(--rb-white-bg);
            color: #000;
        }

        .message {
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 8px 0;
            min-height: 28px;
            color: var(--text-primary);
        }

        .message.win { color: var(--toxic) !important; }
        .message.loss { color: var(--loss-red) !important; }

        .streak-badge {
            background: linear-gradient(135deg, var(--toxic), var(--toxic-dim));
            color: #000;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.8rem;
            display: inline-block;
            margin: 4px 0;
            box-shadow: 0 0 12px var(--toxic-glow);
        }

        .dice-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin: 20px 0;
        }

        .dice-scene {
            perspective: 400px;
            width: 80px;
            height: 80px;
        }

        .cube {
            width: 80px;
            height: 80px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 2s cubic-bezier(0.25, 0.1, 0.15, 1);
        }

        .face {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--bg-card-solid);
            border: 2px solid var(--toxic-dim);
            border-radius: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: var(--toxic);
            backface-visibility: hidden;
            box-shadow: 0 0 8px var(--toxic-glow);
        }

        .front  { transform: translateZ(40px); }
        .back   { transform: rotateY(180deg) translateZ(40px); }
        .right  { transform: rotateY(90deg) translateZ(40px); }
        .left   { transform: rotateY(-90deg) translateZ(40px); }
        .top    { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }

        .mines-column {
            display: flex;
            flex-direction: row;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 8px;
            margin: 12px 0;
            background: var(--bg-input);
            border-radius: 16px;
            min-height: 220px;
            max-height: 220px;
            align-items: center;
            border: 1px solid var(--border-color);
            width: calc(100% - 16px);
            margin-left: 8px;
        }

        .mine-history-cell {
            min-width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .mine-choices {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-left: 10px;
            min-width: 200px;
        }

        .mine-choice-btn {
            width: 55px;
            height: 55px;
            background: var(--slot-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid var(--slot-border);
            transition: all 0.2s ease;
        }

        .mine-choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .mine-choice-btn.highlight {
            box-shadow: 0 0 18px var(--toxic);
            border-color: var(--toxic);
        }

        .start-cell-mines {
            background: var(--toxic);
            color: #000;
            font-weight: 800;
            min-width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 12px var(--toxic-glow);
        }

        .mines-info-bar {
            text-align: center;
            margin: 6px 0;
            font-weight: 600;
            color: var(--text-primary);
        }

        .mines-info-bar span {
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
        }

        .right-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .right-section-title {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .right-btn, .shop-item-btn {
            width: 100%;
            padding: 10px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            margin-bottom: 5px;
        }

        .right-btn:last-child, .shop-item-btn:last-child {
            margin-bottom: 0;
        }

        .right-btn:active, .shop-item-btn:active {
            transform: scale(0.97);
        }

        .right-btn:disabled, .shop-item-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .right-btn.work-btn {
            background: linear-gradient(135deg, var(--toxic), var(--toxic-dim));
            color: #000;
        }

        .right-btn.upgrade-btn-r {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .right-btn.loan-btn-r {
            background: linear-gradient(135deg, var(--gold), #ccac00);
            color: #000;
        }

        .right-btn.repay-btn-r {
            background: linear-gradient(135deg, var(--toxic-dim), var(--toxic));
            color: #000;
        }

        .right-btn.auto-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
        }

        .right-timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-primary);
            opacity: 0.8;
            margin-top: 4px;
        }

        .right-info {
            font-size: 0.75rem;

<script>
    (function() {
        const htmlEl = document.documentElement;
        const themeBtn = document.getElementById('themeToggle');
        let currentTheme = localStorage.getItem('ct10') || 'dark';

        function applyTheme(theme) {
            currentTheme = theme;
            htmlEl.setAttribute('data-theme', theme);
            themeBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('ct10', theme);
        }
        applyTheme(currentTheme);
        themeBtn.onclick = () => applyTheme(currentTheme === 'dark' ? 'light' : 'dark');

        const confettiContainer = document.getElementById('confettiContainer');

        function spawnConfetti() {
            const colors = ['#00ff64', '#00cc50', '#00b848', '#39ff14', '#66ff99', '#00e55c', '#7fff00', '#32cd32'];
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 10 + 6) + 'px';
                confetti.style.height = (Math.random() * 14 + 8) + 'px';
                confetti.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                confettiContainer.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2500);
            }
        }

        // Навигация по секциям
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const sectionId = btn.dataset.section;
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(sectionId + 'Section').classList.add('active');
                btn.classList.add('active');

                if (sectionId === 'shop') renderShop();
                if (sectionId === 'buffs') renderBuffs();
                if (sectionId === 'settings') {
                    setTimeout(initLeaderboardOnOpen, 50);
                }
            });
        });

        // Переключение игр
        document.querySelectorAll('.game-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
                document.getElementById(tab.dataset.game).classList.add('active');
            });
        });

        // --- 3D Reel Engine ---
        const REEL_SYMBOLS = ['🥭','🍊','🍉','💎','🍇','🍎','🍋','🍌','🍓','🍒'];
        const SYMBOLS_COUNT = REEL_SYMBOLS.length;
        const ANGLE_STEP = 360 / SYMBOLS_COUNT;
        const REEL_RADIUS_3 = 115;
        const REEL_RADIUS_5 = 92;

        function createReel(radius) {
            const outer = document.createElement('div');
            outer.className = 'reel-outer';
            const windowEl = document.createElement('div');
            windowEl.className = 'reel-window';
            const cylinder = document.createElement('div');
            cylinder.className = 'reel-cylinder';
            REEL_SYMBOLS.forEach((sym, i) => {
                const face = document.createElement('div');
                face.className = 'reel-face';
                face.textContent = sym;
                face.style.transform = `rotateX(${i * ANGLE_STEP}deg) translateZ(${radius}px)`;
                face.setAttribute('data-symbol', sym);
                face.setAttribute('data-index', i);
                cylinder.appendChild(face);
            });
            windowEl.appendChild(cylinder);
            const shadowTop = document.createElement('div');
            shadowTop.className = 'reel-shadow-top';
            const shadowBottom = document.createElement('div');
            shadowBottom.className = 'reel-shadow-bottom';
            outer.appendChild(windowEl);
            outer.appendChild(shadowTop);
            outer.appendChild(shadowBottom);
            const startIndex = Math.floor(Math.random() * SYMBOLS_COUNT);
            const startAngle = -startIndex * ANGLE_STEP;
            cylinder.style.transform = `rotateX(${startAngle}deg)`;
            return { outer, cylinder, currentAngle: startAngle, radius };
        }

        function spinReel(reelObj, targetIndex, duration, delay, callback) {
            setTimeout(() => {
                const { cylinder, currentAngle } = reelObj;
                const target = -targetIndex * ANGLE_STEP;
                let diff = ((currentAngle - target) % 360 + 360) % 360;
                if (diff === 0) diff = 360;
                const extraRotations = 4 + Math.floor(Math.random() * 3);
                const newAngle = currentAngle - extraRotations * 360 - diff;

                else if (grid[r][0]===grid[r][1] && grid[r][1]===grid[r][2] && grid[r][2]===grid[r][3]) { totalWin += (winTable[grid[r][0]]||20)*1.2; winCells.add(`slot35-${r}-0`); winCells.add(`slot35-${r}-1`); winCells.add(`slot35-${r}-2`); winCells.add(`slot35-${r}-3`); }
                else if (grid[r][1]===grid[r][2] && grid[r][2]===grid[r][3] && grid[r][3]===grid[r][4]) { totalWin += (winTable[grid[r][1]]||20)*1.2; winCells.add(`slot35-${r}-1`); winCells.add(`slot35-${r}-2`); winCells.add(`slot35-${r}-3`); winCells.add(`slot35-${r}-4`); }
                else if (grid[r][0]===grid[r][1] && grid[r][1]===grid[r][2]) { totalWin += (winTable[grid[r][0]]||20)*0.5; winCells.add(`slot35-${r}-0`); winCells.add(`slot35-${r}-1`); winCells.add(`slot35-${r}-2`); }
                else if (grid[r][1]===grid[r][2] && grid[r][2]===grid[r][3]) { totalWin += (winTable[grid[r][1]]||20)*0.5; winCells.add(`slot35-${r}-1`); winCells.add(`slot35-${r}-2`); winCells.add(`slot35-${r}-3`); }
                else if (grid[r][2]===grid[r][3] && grid[r][3]===grid[r][4]) { totalWin += (winTable[grid[r][2]]||20)*0.5; winCells.add(`slot35-${r}-2`); winCells.add(`slot35-${r}-3`); winCells.add(`slot35-${r}-4`); }
            }
            for (let c=0; c<5; c++) if (grid[0][c]===grid[1][c] && grid[1][c]===grid[2][c]) { totalWin += (winTable[grid[0][c]]||20)*1.5; winCells.add(`slot35-0-${c}`); winCells.add(`slot35-1-${c}`); winCells.add(`slot35-2-${c}`); }
            if (grid[0][0]===grid[1][1] && grid[1][1]===grid[2][2]) { totalWin += (winTable[grid[0][0]]||20)*2; winCells.add('slot35-0-0'); winCells.add('slot35-1-1'); winCells.add('slot35-2-2'); }
            if (grid[0][1]===grid[1][2] && grid[1][2]===grid[2][3]) { totalWin += (winTable[grid[0][1]]||20)*2; winCells.add('slot35-0-1'); winCells.add('slot35-1-2'); winCells.add('slot35-2-3'); }
            if (grid[0][2]===grid[1][3] && grid[1][3]===grid[2][4]) { totalWin += (winTable[grid[0][2]]||20)*2; winCells.add('slot35-0-2'); winCells.add('slot35-1-3'); winCells.add('slot35-2-4'); }
            if (grid[0][4]===grid[1][3] && grid[1][3]===grid[2][2]) { totalWin += (winTable[grid[0][4]]||20)*2; winCells.add('slot35-0-4'); winCells.add('slot35-1-3'); winCells.add('slot35-2-2'); }
            if (grid[0][3]===grid[1][2] && grid[1][2]===grid[2][1]) { totalWin += (winTable[grid[0][3]]||20)*2; winCells.add('slot35-0-3'); winCells.add('slot35-1-2'); winCells.add('slot35-2-1'); }
            if (grid[0][2]===grid[1][1] && grid[1][1]===grid[2][0]) { totalWin += (winTable[grid[0][2]]||20)*2; winCells.add('slot35-0-2'); winCells.add('slot35-1-1'); winCells.add('slot35-2-0'); }
            return { totalWin, winCells };
        }

        document.getElementById('spin35').onclick = () => {
            if (isSpinning) return;
            if (!hasBuff('free_slots')) { if (!spend(100)) { alert('Нужно 100$'); return; } }
            isSpinning = true; disableGameButtons();
            const hasSlotsLuck = hasBuff('slots_luck');
            let finalGrid = [];
            if (hasSlotsLuck && Math.random() < 0.15) {
                const winIcon = icons35[Math.floor(Math.random()*icons35.length)];
                for (let r=0; r<3; r++) { finalGrid[r]=[]; for (let c=0; c<5; c++) finalGrid[r][c]=winIcon; }
            } else {
                for (let r=0; r<3; r++) { finalGrid[r]=[]; for (let c=0; c<5; c++) finalGrid[r][c]=icons35[Math.floor(Math.random()*icons35.length)]; }
            }
            document.querySelectorAll('#reels35grid .slot-icon').forEach(icon => icon.classList.add('spinning'));
            [0,1,2,3,4].forEach((col, colIndex) => {
                setTimeout(() => {
                    for (let row=0; row<3; row++) {
                        document.getElementById(`slot35-${row}-${col}`).textContent = finalGrid[row][col];
                        document.getElementById(`slot35-${row}-${col}`).classList.remove('spinning');
                    }
                    if (colIndex === 4) {
                        setTimeout(() => {
                            const { totalWin, winCells } = checkWin35Lines(finalGrid);
                            winCells.forEach(id => {
                                const el = document.getElementById(id);
                                if (el) { el.classList.add('win-highlight'); setTimeout(() => el.classList.remove('win-highlight'), 3000); }
                            });
                            if (totalWin > 0) { addBalance(totalWin); setMessageElement(document.getElementById('msg35'),`+${totalWin}$`,'win'); handleStreak('slots35',true); }
                            else { setMessageElement(document.getElementById('msg35'),'Нет совпадений','loss'); handleStreak('slots35',false); }
                            isSpinning = false; enableGameButtons();
                        }, 200);
                    }
                }, colIndex * 400);
            });
        };

        // Колесо
        function updateRbDisplay() { document.getElementById('rbBetDisplay').textContent = rbBet + '$'; }
        document.getElementById('rbMinus').onclick = () => { if (!isSpinning && rbBet > 10) { rbBet = Math.max(10, rbBet-5); updateRbDisplay(); } };
        document.getElementById('rbPlus').onclick = () => { if (!isSpinning && rbBet < balance) { rbBet += 5; updateRbDisplay(); } };

        document.getElementById('betRed').onclick = () => playColorChoice('red');
        document.getElementById('betBlack').onclick = () => playColorChoice('black');
        document.getElementById('betWhite').onclick = () => playColorChoice('white');

        function playColorChoice(choice) {
            if (isSpinning) return;
            if (!spend(rbBet)) return;
            isSpinning = true; disableGameButtons();
            const msg = document.getElementById('msgRB'); msg.textContent = 'Вращение...'; msg.classList.remove('win','loss');
            const hasRbDiceLuck = hasBuff('rb_dice_luck');
            let winColor;
            if (hasRbDiceLuck && Math.random() < 0.3) winColor = choice;
            else {
                const r = Math.random();
                if (r < 1/9) winColor = 'white'; else if (r < 5/9) winColor = 'red'; else winColor = 'black';
            }
            const centerAngles = { white:340, red:[60,140,220,300], black:[100,180,260,20] };
            let angle = winColor==='white' ? 340 : (winColor==='red' ? centerAngles.red[Math.floor(Math.random()*4)] : centerAngles.black[Math.floor(Math.random()*4)]);
            wheel.style.transition = 'transform 1.8s cubic-bezier(0.25,0.1,0.15,1)';
            wheel.style.transform = `rotate(${5*360+angle}deg)`;
            setTimeout(() => {
                if (choice === winColor) {
                    const mult = choice === 'white' ? 15 : 1.5;
                    const winAmount = Math.floor(rbBet * mult);
                    addBalance(winAmount); setMessageElement(msg, `+${winAmount}$`, 'win'); handleStreak('redblack', true);
                } else { setMessageElement(msg, 'Проигрыш', 'loss'); handleStreak('redblack', false); }
                isSpinning = false; enableGameButtons();
            }, 1900);
        }

        // Кости
        function updateDiceDisplay() { document.getElementById('diceBetDisplay').textContent = diceBet + '$'; }
        document.getElementById('diceMinus').onclick = () => { if (!isSpinning && diceBet > 10) { diceBet = Math.max(10, diceBet-5); updateDiceDisplay(); } };
        document.getElementById('dicePlus').onclick = () => { if (!isSpinning && diceBet < balance) { diceBet += 5; updateDiceDisplay(); } };
        const cubeRotations = ['rotateX(0deg) rotateY(0deg)','rotateY(180deg)','rotateY(-90deg)','rotateY(90deg)','rotateX(-90deg)','rotateX(90deg)'];
        document.getElementById('rollDice').onclick = () => {
            if (isSpinning) return;
            if (!spend(diceBet)) { alert('Нужно ' + diceBet + '$'); return; }
            isSpinning = true; disableGameButtons();
            let val1, val2;
            const hasRbDiceLuck = hasBuff('rb_dice_luck');
            if (hasRbDiceLuck && Math.random() < 0.3) { val1 = Math.floor(Math.random()*6); val2 = val1; }
            else { val1 = Math.floor(Math.random()*6); val2 = Math.floor(Math.random()*6); while (val2===val1) val2 = Math.floor(Math.random()*6); }
            const extraSpins = 3 + Math.floor(Math.random()*3);
            document.getElementById('cube1').style.transform = `rotateX(${extraSpins*360}deg) rotateY(${extraSpins*360}deg) ${cubeRotations[val1]}`;
            document.getElementById('cube2').style.transform = `rotateX(${extraSpins*360}deg) rotateY(${extraSpins*360}deg) ${cubeRotations[val2]}`;
            setTimeout(() => {
                const msg = document.getElementById('msgDice');
                if (val1 === val2) { const winAmount = Math.floor(diceBet * 1.5); addBalance(winAmount); setMessageElement(msg, `Дубль! +${winAmount}$`,'win'); handleStreak('dice',true); }
                else { setMessageElement(msg, 'Нет дубля','loss'); handleStreak('dice',false); }
                isSpinning = false; enableGameButtons();
            }, 2100);
        };

        // Мины
        function generateMineBoard() {
            const mineCount = minesCleared >= 10 ? 2 : 1;
            const board = Array(3).fill('safe');
            let placed = 0;
            while (placed < mineCount) { const r = Math.floor(Math.random()*3); if (board[r] === 'safe') { board[r] = 'mine'; placed++; } }
            return board;
        }

        function renderMinesColumn() {
            const mc = document.getElementById('minesColumn');
            mc.innerHTML = '<div class="start-cell-mines">🏁</div>';
            minesHistory.forEach(cell => {
                const d = document.createElement('div'); d.className = 'mine-history-cell';
                d.textContent = cell === 'mine' ? '🧨' : '✅';
                d.style.background = cell === 'mine' ? 'var(--mine-mine)' : 'var(--mine-safe)';
                mc.appendChild(d);
            });
            if (minesGameActive) {
                const cc = document.createElement('div'); cc.className = 'mine-choices';
                currentMinesBoard.forEach((cell, idx) => {
                    const btn = document.createElement('div'); btn.className = 'mine-choice-btn'; btn.textContent = '?';
                    if (sapperUsesLeft > 0 && cell === 'safe') btn.classList.add('highlight');
                    btn.onclick = () => revealMineCell(idx);
                    cc.appendChild(btn);
                });
                mc.appendChild(cc);
            }
            mc.scrollLeft = mc.scrollWidth;
        }

        function revealMineCell(idx) {
            if (!minesGameActive || isSpinning) return;
            if (currentMinesBoard[idx] === 'mine') {
                minesHistory.push('mine'); minesGameActive = false;
                setMessageElement(document.getElementById('msgMines'), '💥 Взрыв!', 'loss'); handleStreak('mines', false);
            } else {
                minesHistory.push('safe'); minesCleared++; minesPrize += 5;
                document.getElementById('minesCleared').textContent = minesCleared;
                document.getElementById('minesPrize').textContent = minesPrize;
                currentMinesBoard = generateMineBoard();
                if (sapperUsesLeft > 0) { sapperUsesLeft--; save(); }
            }
            renderMinesColumn();
        }

        document.getElementById('cashOutMines').onclick = () => {
            if (isSpinning) return;
            if (minesGameActive) {
                if (minesPrize > 0) { addBalance(minesPrize); handleStreak('mines', true); }
                minesGameActive = false; minesCleared = 0; minesPrize = 0; minesHistory = [];
                document.getElementById('minesCleared').textContent = '0';
                document.getElementById('minesPrize').textContent = '0';
                renderMinesColumn();
            } else {
                if (!spend(20)) { alert('Нужно 20$'); return; }
                minesGameActive = true; minesCleared = 0; minesPrize = 0; minesHistory = [];
                currentMinesBoard = generateMineBoard();
                document.getElementById('minesCleared').textContent = '0';
                document.getElementById('minesPrize').textContent = '0';
                renderMinesColumn();
            }
        };

        document.getElementById('refreshShop').onclick = () => refreshShop(true);

        if (!shopRefreshTime || shopRefreshTime < Date.now()) {
            if (!shopItems.length) { shopItems = getAvailableShopItems(); purchasedItems = []; shopRefreshTime = Date.now() + 60*60*1000; }
        }

        function updateBuffWarning() {
        const btn = document.querySelector('.nav-btn[data-section="buffs"]');
            if (!btn) return;
    
            const now = Date.now();
            // Фильтруем уже истекшие баффы
            const active = activeBuffs.filter(b => b.endTime > now);
    
            if (active.length === 0) {
                 btn.classList.remove('buff-warning');
                 return;
            }
    
            // Находим минимальное оставшееся время
            const minRemaining = Math.min(...active.map(b => b.endTime - now));
    
            if (minRemaining <= 10000) {
                 btn.classList.add('buff-warning');
            } else {
                 btn.classList.remove('buff-warning');
            }
        }

        initReels3(); initReels5(); buildGrid35(); renderMinesColumn();
        updateUI(); updateRbDisplay(); updateDiceDisplay(); renderShop(); renderBuffs(); applyBuffs();

        setInterval(() => { updateShopTimer(); renderBuffs(); applyBuffs(); updateLoanTimer(); updateBuffWarning(); }, 1000);

        // ========== ЛИДЕРБОРД (Google Sheets) ==========
        const LEADERBOARD_URL = 'https://script.google.com/macros/s/AKfycbweFQ3q6zXZn0NXHAxoJEx2LH--sx20kqISsj7Np9OAxUyLsygvzcx1VnXjGsV1eM84gg/exec';
        let playerName = localStorage.getItem('playerName') || '';

        async function updateLeaderboard() {
            const container = document.getElementById('leaderboardList');
            if (!container) return;

            container.innerHTML = '<div class="loading-spinner">✦</div>';

            try {
                const res = await fetch(LEADERBOARD_URL);
                let data = await res.json();
                if (!Array.isArray(data)) data = [];

                data.sort((a, b) => b.money - a.money);

                container.innerHTML = '';

                if (data.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--text-muted);">Нет данных</div>';
                } else {
                    for (let i = 0; i < Math.min(100, data.length); i++) {
                        const row = document.createElement('div');
                        row.className = 'leaderboard-row';
                        if (playerName && data[i].name === playerName) row.classList.add('highlight');

                        let medal = '';
                        if (i === 0) medal = '🥇 ';
                        else if (i === 1) medal = '🥈 ';
                        else if (i === 2) medal = '🥉 ';

                        row.innerHTML = `
                    <div class="rank">${medal}${i + 1}</div>
                    <div class="name">${escapeHtml(data[i].name)}</div>
                    <div class="money">${data[i].money} $</div>
                `;
                        container.appendChild(row);
                    }
                }

                // Обновляем статистику текущего игрока
                const myEntry = data.find(e => e.name === playerName);
                document.getElementById('playerPlace').textContent = myEntry ? `#${data.indexOf(myEntry) + 1}` : '—';
                document.getElementById('playerNameDisplay').textContent = playerName || 'Гость';
                document.getElementById('playerMoneyDisplay').textContent = (myEntry ? myEntry.money : balance) + ' $';

            } catch (e) {
                console.warn('Leaderboard load error', e);
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: red;">Ошибка загрузки</div>';
            }
        }

        async function sendMyScore() {
            if (!playerName) return;
            try {
                await fetch(LEADERBOARD_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: playerName, money: Math.floor(balance) })
                });
            } catch(e) { console.warn('Send score error', e); }
        }

        function showNameInput() {
            const container = document.getElementById('nameInputContainer');
            if (!container) return;
            container.innerHTML = `
                <div class="name-input-form">
                    <input type="text" id="newPlayerName" maxlength="16" placeholder="Твой ник" autocomplete="off">
                    <button id="saveNameBtn">Сохранить</button>
                </div>
            `;
            document.getElementById('saveNameBtn').onclick = () => {
                const newName = document.getElementById('newPlayerName').value.trim();
                if (newName.length < 2) { alert('Минимум 2 символа'); return; }
                playerName = newName;
                localStorage.setItem('playerName', playerName);
                container.innerHTML = '';
                updateLeaderboard();
                sendMyScore();
            };
        }

        function initLeaderboardOnOpen() {
            if (!playerName) {
                showNameInput();
                updateLeaderboard();
            } else {
                updateLeaderboard();
                sendMyScore();
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        if (document.getElementById('settingsSection').classList.contains('active')) {
            initLeaderboardOnOpen();
        }
    })();
</script>
</body>
</html>
