<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lume | Casino Game</title>
  <style>
    :root {
      --toxic: #00ff64;
      --toxic-dim: #00cc50;
      --toxic-glow: rgba(0, 255, 100, 0.3);
      --toxic-glow-strong: rgba(0, 255, 100, 0.6);
      --gold: #ffd700;
      --gold-glow: rgba(255, 215, 0, 0.4);
      --loss-red: #ff0040;
      --loss-red-glow: rgba(255, 0, 64, 0.5);
      --transition-speed: 0.4s;
      --wheel-red: #c0392b;
      --wheel-black: #1e272e;
      --wheel-white: #f0f0f0;
    }

    [data-theme="dark"] {
      --bg-primary: #050505;
      --bg-secondary: #0f0f0f;
      --bg-card: rgba(20, 20, 20, 0.8);
      --bg-card-solid: #141414;
      --bg-input: #1a1a1a;
      --bg-tab: #1a1a1a;
      --bg-tab-active: var(--toxic);
      --text-primary: var(--toxic);
      --text-secondary: #00cc50;
      --text-muted: #444;
      --text-on-active: #000;
      --border-color: rgba(0, 255, 100, 0.15);
      --border-active: var(--toxic);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.6);
      --shadow-neon: 0 0 10px var(--toxic-glow), 0 0 30px rgba(0, 255, 100, 0.1);
      --slot-bg: #111;
      --slot-border: #333;
      --mine-safe: #1a3322;
      --mine-mine: #331111;
      --scrollbar-track: #111;
      --scrollbar-thumb: #333;
      --rb-red-bg: linear-gradient(135deg, #e74c3c, #c0392b);
      --rb-black-bg: linear-gradient(135deg, #2c3e50, #1a1a2e);
      --rb-white-bg: linear-gradient(135deg, #ffffff, #e0e0e0);
    }

    [data-theme="light"] {
      --bg-primary: #f0f0f0;
      --bg-secondary: #e8e8e8;
      --bg-card: rgba(255, 255, 255, 0.95);
      --bg-card-solid: #ffffff;
      --bg-input: #e0e0e0;
      --bg-tab: #e0e0e0;
      --bg-tab-active: var(--toxic);
      --text-primary: #00b848;
      --text-secondary: #009938;
      --text-muted: #888;
      --text-on-active: #000;
      --border-color: rgba(0, 180, 70, 0.2);
      --border-active: #00cc50;
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.1);
      --shadow-neon: 0 0 10px rgba(0, 255, 100, 0.2), 0 0 30px rgba(0, 255, 100, 0.05);
      --slot-bg: #f5f5f5;
      --slot-border: #ccc;
      --mine-safe: #d4edda;
      --mine-mine: #f8d7da;
      --scrollbar-track: #ddd;
      --scrollbar-thumb: #bbb;
      --rb-red-bg: linear-gradient(135deg, #ff6b6b, #e74c3c);
      --rb-black-bg: linear-gradient(135deg, #34495e, #2c3e50);
      --rb-white-bg: linear-gradient(135deg, #ffffff, #cccccc);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-primary);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      overflow: hidden; touch-action: manipulation;
      transition: background var(--transition-speed) ease;
      position: fixed;
      top: 0;
      left: 0;
    }

    .casino-phone {
      width: 100%; height: 100vh;
      background: var(--bg-secondary); display: flex; flex-direction: column;
      box-shadow: var(--shadow-card);
      border: none;
      overflow: hidden;
      position: relative; transition: all var(--transition-speed) ease;
    }

    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; position: relative; }
    .game-scroll-area { flex: 1; overflow-y: auto; min-height: 0; padding-right: 4px; padding-bottom: 60px; }
    .game-scroll-area::-webkit-scrollbar { width: 3px; }
    .game-scroll-area::-webkit-scrollbar-track { background: transparent; }
    .game-scroll-area::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 110px; gap: 10px; flex-shrink: 0; position: relative;
    }
    .balance-box {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 30px; padding: 10px 16px; font-weight: 800; font-size: 1.2rem;
      color: var(--gold); font-family: 'JetBrains Mono', monospace;
      backdrop-filter: blur(10px); flex: 1; text-align: center;
    }
    .record-box {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 24px; padding: 8px 14px; font-weight: 700; font-size: 0.8rem;
      color: var(--text-primary); backdrop-filter: blur(10px);
      white-space: nowrap; position: relative; z-index: 10;
    }

    .left-toggles {
      position: absolute; left: -2px; top: 40%; z-index: 50;
      display: flex; flex-direction: column; gap: 4px;
    }
    .right-toggles {
      position: absolute; right: -2px; top: 40%; z-index: 50;
      display: flex; flex-direction: column; gap: 4px;
    }
    .side-toggle {
      width: 28px; height: 56px; background: var(--bg-card);
      border: 1px solid var(--border-color); color: var(--text-primary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; z-index: 50; transition: all 0.3s ease; backdrop-filter: blur(10px);
      position: relative; margin: 0;
    }
    .left-toggles .side-toggle { border-radius: 0 14px 14px 0; }
    .right-toggles .side-toggle { border-radius: 14px 0 0 14px; }
    .side-toggle:hover { box-shadow: 0 0 12px var(--toxic-glow); }

    .side-panel-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 60; opacity: 0;
      pointer-events: none; transition: opacity 0.3s ease;
    }
    .side-panel-overlay.active { opacity: 1; pointer-events: auto; }

    .side-panel {
      position: absolute; top: 0; bottom: 0; width: 280px;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      z-index: 70; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
    }
    .side-panel.left-panel {
      left: 0; transform: translateX(-100%); border-radius: 0 20px 20px 0; border-left: none;
    }
    .side-panel.left-panel.open { transform: translateX(0); }
    .side-panel.right-panel {
      right: 0; transform: translateX(100%); border-radius: 20px 0 0 20px; border-right: none;
    }
    .side-panel.right-panel.open, .side-panel.shop-panel.open, .side-panel.buffs-panel.open {
      transform: translateX(0);
    }

    .side-panel-header {
      padding: 16px; font-weight: 800; font-size: 1rem; color: var(--text-primary);
      border-bottom: 1px solid var(--border-color); display: flex;
      align-items: center; justify-content: space-between; gap: 8px;
      flex-shrink: 0;
    }
    .side-panel-content { 
      padding: 12px; 
      flex: 1; 
      overflow-y: auto;
      padding-bottom: 80px;
    }
    .side-panel-footer { 
      padding: 12px; 
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
      background: var(--bg-secondary);
      position: sticky;
      bottom: 0;
      z-index: 5;
    }

    .panel-header-buttons { display: flex; gap: 8px; align-items: center; }
    .theme-toggle-panel, .home-btn-panel {
      width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card);
      border: 1px solid var(--border-color); color: var(--text-primary);
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.3s ease; backdrop-filter: blur(10px);
      text-decoration: none; font-weight: 700;
    }
    .theme-toggle-panel:hover, .home-btn-panel:hover { border-color: var(--toxic); }

    .panel-game-tab {
      width: 100%; padding: 12px 14px; margin-bottom: 6px; border-radius: 14px;
      font-weight: 700; background: var(--bg-input); border: 1px solid var(--border-color);
      color: var(--text-primary); cursor: pointer; font-size: 0.85rem;
      transition: all 0.2s ease; font-family: 'Inter', sans-serif; text-align: left;
    }
    .panel-game-tab:hover { border-color: var(--toxic); background: rgba(0, 255, 100, 0.05); }
    .panel-game-tab.active {
      background: var(--toxic); color: #000; border-color: var(--toxic);
      box-shadow: 0 0 12px var(--toxic-glow);
    }

    .right-section {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 16px; padding: 12px; margin-bottom: 10px;
    }
    .right-section-title { font-weight: 700; font-size: 0.8rem; color: var(--text-primary); margin-bottom: 8px; }

    .right-btn, .shop-item-btn {
      width: 100%; padding: 10px; border-radius: 14px; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; border: none; transition: all 0.2s ease;
      font-family: 'Inter', sans-serif; margin-bottom: 5px;
    }
    .right-btn:last-child { margin-bottom: 0; }
    .right-btn:active, .shop-item-btn:active { transform: scale(0.97); }
    .right-btn:disabled, .shop-item-btn:disabled {
      background: #333; color: #666; cursor: not-allowed; opacity: 0.6;
    }

    .right-btn.work-btn { background: linear-gradient(135deg, var(--toxic), var(--toxic-dim)); color: #000; }
    .right-btn.upgrade-btn-r { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-primary); }
    .right-btn.loan-btn-r { background: linear-gradient(135deg, var(--gold), #ccac00); color: #000; }
    .right-btn.repay-btn-r { background: linear-gradient(135deg, var(--toxic-dim), var(--toxic)); color: #000; }
    .right-btn.auto-btn { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff; }
    .right-timer { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-primary); opacity: 0.8; margin-top: 4px; }
    .right-info { font-size: 0.75rem; color: var(--text-primary); margin-bottom: 6px; }
    .gold-text { color: var(--gold); font-family: 'JetBrains Mono', monospace; }

    .game-tabs {
      display: none;
    }

    .game-panel {
      display: none; flex-direction: column; justify-content: center;
      margin-bottom: 12px; animation: panelFadeIn 0.3s ease; padding: 0 8px;
    }
    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .game-panel.active { display: flex; }

    .slot-row { display: flex; gap: 8px; justify-content: center; margin: 12px 0; flex-wrap: wrap; }
    #reels35grid { display: flex; flex-direction: column; gap: 8px; align-items: center; margin: 12px 0; }

    .slot-icon {
      width: 52px; height: 62px; background: var(--slot-bg); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
      border: 2px solid var(--slot-border); transition: all 0.2s; position: relative; overflow: hidden;
    }
    .slot-icon.win-highlight {
      border-color: var(--toxic) !important;
      box-shadow: 0 0 18px var(--toxic), 0 0 40px var(--toxic-glow-strong);
      animation: winHighlightAnim 3s ease-out forwards;
    }
    @keyframes winHighlightAnim {
      0% { border-color: var(--toxic); box-shadow: 0 0 18px var(--toxic), 0 0 40px var(--toxic-glow-strong); }
      50% { border-color: var(--toxic); box-shadow: 0 0 18px var(--toxic), 0 0 40px var(--toxic-glow-strong); }
      100% { border-color: var(--slot-border); box-shadow: none; }
    }
    .slot-icon.spinning { animation: slotShake 0.08s infinite; }
    @keyframes slotShake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .bet-btn {
      width: 100%; padding: 13px; background: var(--toxic); border: none;
      border-radius: 24px; font-weight: 800; font-size: 1.1rem; cursor: pointer;
      color: #000; margin-top: 10px; transition: all 0.3s ease; font-family: 'Inter', sans-serif;
      position: relative; overflow: hidden;
    }
    .bet-btn:hover:not(:disabled) { box-shadow: 0 0 20px var(--toxic-glow-strong), 0 4px 15px rgba(0,0,0,0.3); transform: translateY(-1px); }
    .bet-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    .bet-controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 8px 0; }
    .bet-adj-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--bg-input);
      border: 1.5px solid var(--border-color); color: var(--text-primary);
      font-size: 1.4rem; font-weight: 800; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s ease; font-family: 'Inter', sans-serif;
    }
    .bet-adj-btn:disabled { background: #222; border-color: #333; color: #555; cursor: not-allowed; }
    .bet-display {
      background: var(--bg-input); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 8px 16px; color: var(--gold);
      font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1rem;
      min-width: 80px; text-align: center; cursor: pointer;
    }

    .bet-input {
      background: transparent; border: none; color: var(--gold);
      font-family: 'JetBrains Mono', monospace; font-weight: 700;
      font-size: 1rem; text-align: center; width: 100%; outline: none;
    }
    .bet-input::-webkit-inner-spin-button, .bet-input::-webkit-outer-spin-button {
      -webkit-appearance: none; margin: 0;
    }

    .wheel-wrapper { position: relative; display: flex; justify-content: center; margin: 14px 0; }
    .wheel {
      width: 195px; height: 195px; border-radius: 50%;
      background: conic-gradient(
        var(--wheel-white) 0deg 40deg,
        var(--wheel-red) 40deg 80deg,
        var(--wheel-black) 80deg 120deg,
        var(--wheel-red) 120deg 160deg,
        var(--wheel-black) 160deg 200deg,
        var(--wheel-red) 200deg 240deg,
        var(--wheel-black) 240deg 280deg,
        var(--wheel-red) 280deg 320deg,
        var(--wheel-black) 320deg 360deg
      );
      border: 5px solid var(--gold); box-shadow: 0 0 20px var(--gold-glow);
      transition: transform 0.3s ease-out;
    }
    .arrow {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      font-size: 32px; color: var(--gold); filter: drop-shadow(0 0 6px var(--gold-glow));
      z-index: 10; pointer-events: none;
    }

    .color-area { display: flex; gap: 12px; justify-content: center; margin: 14px 0; flex-wrap: wrap; }
    .color-card {
      width: 70px; height: 70px; border-radius: 18px; display: flex; align-items: center;
      justify-content: center; font-size: 1.5rem; cursor: pointer; border: 3px solid transparent;
      color: white; transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .color-card:disabled { opacity: 0.5; cursor: not-allowed; }
    .color-card.red-card { background: var(--rb-red-bg); box-shadow: 0 4px 15px rgba(192, 57, 43, 0.5); }
    .color-card.black-card { background: var(--rb-black-bg); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); border-color: #555; }
    .color-card.white-card { background: var(--rb-white-bg); color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.3); }

    .message { text-align: center; font-weight: 700; font-size: 1.1rem; margin: 8px 0; min-height: 28px; color: var(--text-primary); }
    .message.win { color: var(--toxic) !important; }
    .message.loss { color: var(--loss-red) !important; }

    .streak-badge {
      background: linear-gradient(135deg, var(--toxic), var(--toxic-dim));
      color: #000; padding: 5px 14px; border-radius: 20px; font-weight: 800;
      font-size: 0.8rem; display: inline-block; margin: 4px 0; box-shadow: 0 0 12px var(--toxic-glow);
    }

    .dice-container { display: flex; gap: 40px; justify-content: center; margin: 20px 0; }
    .dice-scene { perspective: 400px; width: 80px; height: 80px; }
    .cube {
      width: 80px; height: 80px; position: relative; transform-style: preserve-3d;
      transition: transform 2s cubic-bezier(0.25, 0.1, 0.15, 1);
    }
    .face {
      position: absolute; width: 80px; height: 80px; background: var(--bg-card-solid);
      border: 2px solid var(--toxic-dim); border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-size: 36px; font-weight: bold;
      color: var(--toxic); backface-visibility: hidden; box-shadow: 0 0 8px var(--toxic-glow);
    }
    .front { transform: translateZ(40px); } .back { transform: rotateY(180deg) translateZ(40px); }
    .right { transform: rotateY(90deg) translateZ(40px); } .left { transform: rotateY(-90deg) translateZ(40px); }
    .top { transform: rotateX(90deg) translateZ(40px); } .bottom { transform: rotateX(-90deg) translateZ(40px); }

    .mines-column {
      display: flex; flex-direction: row; gap: 8px; overflow-x: auto;
      padding: 12px 8px; margin: 12px 0; background: var(--bg-input);
      border-radius: 16px; min-height: 220px; max-height: 220px; align-items: center;
      border: 1px solid var(--border-color); width: calc(100% - 16px); margin-left: 8px;
    }
    .mine-history-cell {
      min-width: 55px; height: 55px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
    }
    .mine-choices { display: flex; flex-direction: column; gap: 6px; margin-left: 10px; min-width: 200px; }
    .mine-choice-btn {
      width: 55px; height: 55px; background: var(--slot-bg); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      cursor: pointer; border: 2px solid var(--slot-border); transition: all 0.2s ease;
    }
    .mine-choice-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .mine-choice-btn.highlight { box-shadow: 0 0 18px var(--toxic); border-color: var(--toxic); }
    .start-cell-mines {
      background: var(--toxic); color: #000; font-weight: 800; min-width: 55px;
      height: 55px; border-radius: 12px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; box-shadow: 0 0 12px var(--toxic-glow);
    }
    .mines-info-bar { text-align: center; margin: 6px 0; font-weight: 600; color: var(--text-primary); }
    .mines-info-bar span { color: var(--gold); font-family: 'JetBrains Mono', monospace; }

    .shop-section { margin-bottom: 10px; }
    .shop-item {
      background: var(--bg-input); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 10px; margin-bottom: 8px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .shop-item.purchased { opacity: 0.5; border-color: #333; }
    .shop-item-name { font-weight: 700; color: var(--text-primary); font-size: 0.8rem; }
    .shop-item-desc { font-size: 0.75rem; color: var(--text-primary); opacity: 0.85; }
    .shop-item-cost { font-weight: 700; color: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .shop-item-btn { background: linear-gradient(135deg, var(--toxic), var(--toxic-dim)); color: #000; }
    .shop-item-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    
    .shop-refresh-btn {
      background: linear-gradient(135deg, var(--toxic), var(--toxic-dim));
      border: none; padding: 12px; border-radius: 18px; font-weight: 800;
      cursor: pointer; color: #000; width: 100%; margin-top: 8px;
      font-size: 0.9rem; transition: all 0.2s ease; font-family: 'Inter', sans-serif;
    }
    .shop-refresh-btn:hover:not(:disabled) { box-shadow: 0 0 15px var(--toxic-glow-strong); transform: translateY(-1px); }
    .shop-refresh-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    .buff-item {
      background: var(--bg-input); border: 1px solid var(--toxic);
      border-radius: 10px; padding: 8px; margin-bottom: 6px;
      font-size: 0.75rem; color: var(--text-primary);
    }
    .buff-timer { font-family: 'JetBrains Mono', monospace; color: var(--gold); }

    .debug-toggle {
      width: 100%; padding: 10px 14px; margin-bottom: 6px; border-radius: 12px;
      font-weight: 700; background: var(--bg-input); border: 1px solid var(--border-color);
      color: var(--text-primary); cursor: pointer; font-size: 0.8rem;
      transition: all 0.2s ease; font-family: 'Inter', sans-serif; text-align: left;
    }
    .debug-toggle:hover { border-color: var(--toxic); background: rgba(0, 255, 100, 0.05); }
    .debug-toggle.active {
      background: var(--toxic); color: #000; border-color: var(--toxic);
      box-shadow: 0 0 8px var(--toxic-glow); font-weight: 700;
    }
    .debug-toggle.reset-btn {
      background: var(--loss-red); border-color: var(--loss-red); color: #fff; font-weight: 700;
      margin-top: auto;
    }

    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }
    .confetti {
      position: absolute;
      width: 10px;
      height: 20px;
      opacity: 0.9;
      top: -20px;
      animation: confettiFall 2s linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 400px) {
      .panel-game-tab { font-size: 0.8rem; padding: 10px 12px; }
      .slot-icon { width: 46px; height: 56px; font-size: 24px; }
      .balance-box { font-size: 1rem; padding: 8px 12px; }
    }
  </style>
</head>
<body>
<div class="casino-phone" id="casinoApp">
  <div class="left-toggles">
    <button class="side-toggle" id="leftToggle">▶</button>
    <button class="side-toggle" id="debugToggle" style="display: none;">✦</button>
  </div>
  
  <div class="right-toggles">
    <button class="side-toggle" id="rightToggle">★</button>
    <button class="side-toggle" id="shopToggle">⬢</button>
    <button class="side-toggle" id="buffsToggle">☘</button>
  </div>
  
  <div class="side-panel-overlay" id="panelOverlay"></div>

  <div class="side-panel left-panel" id="leftPanel">
    <div class="side-panel-header">Игры</div>
    <div class="side-panel-content">

<script>
  (function() {
    const htmlEl = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');
    let currentTheme = localStorage.getItem('ct10') || 'dark';
    
    function applyTheme(theme) {
      currentTheme = theme;
      htmlEl.setAttribute('data-theme', theme);
      themeBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('ct10', theme);
    }
    applyTheme(currentTheme);
    themeBtn.onclick = () => applyTheme(currentTheme === 'dark' ? 'light' : 'dark');

    const confettiContainer = document.getElementById('confettiContainer');
    
    function spawnConfetti() {
      const colors = ['#00ff64', '#00cc50', '#00b848', '#39ff14', '#66ff99', '#00e55c', '#7fff00', '#32cd32'];
      for (let i = 0; i < 60; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.width = (Math.random() * 10 + 6) + 'px';
        confetti.style.height = (Math.random() * 14 + 8) + 'px';
        confetti.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
        confettiContainer.appendChild(confetti);
        setTimeout(() => confetti.remove(), 2500);
      }
    }

    const leftPanel = document.getElementById('leftPanel');
    const debugPanel = document.getElementById('debugPanel');
    const rightPanel = document.getElementById('rightPanel');
    const shopPanel = document.getElementById('shopPanel');
    const buffsPanel = document.getElementById('buffsPanel');
    const panelOverlay = document.getElementById('panelOverlay');
    const debugToggleBtn = document.getElementById('debugToggle');

    function closeAllPanels() {
      leftPanel.classList.remove('open');
      debugPanel.classList.remove('open');
      rightPanel.classList.remove('open');
      shopPanel.classList.remove('open');
      buffsPanel.classList.remove('open');
      panelOverlay.classList.remove('active');
    }

    document.getElementById('leftToggle').onclick = () => {
      if (leftPanel.classList.contains('open')) { closeAllPanels(); }
      else { closeAllPanels(); leftPanel.classList.add('open'); panelOverlay.classList.add('active'); }
    };

    debugToggleBtn.onclick = () => {
      if (debugPanel.classList.contains('open')) { closeAllPanels(); }
      else { closeAllPanels(); debugPanel.classList.add('open'); panelOverlay.classList.add('active'); updateDebugButtons(); }
    };

    document.getElementById('rightToggle').onclick = () => {
      if (rightPanel.classList.contains('open')) { closeAllPanels(); }
      else { closeAllPanels(); rightPanel.classList.add('open'); panelOverlay.classList.add('active'); }
    };

    document.getElementById('shopToggle').onclick = () => {
      if (shopPanel.classList.contains('open')) { closeAllPanels(); }
      else { closeAllPanels(); shopPanel.classList.add('open'); panelOverlay.classList.add('active'); renderShop(); }
    };

    document.getElementById('buffsToggle').onclick = () => {
      if (buffsPanel.classList.contains('open')) { closeAllPanels(); }
      else { closeAllPanels(); buffsPanel.classList.add('open'); panelOverlay.classList.add('active'); renderBuffs(); }
    };

    document.getElementById('closeDebugPanel').onclick = () => { debugPanel.classList.remove('open'); panelOverlay.classList.remove('active'); };
    document.getElementById('closeShopPanel').onclick = () => { shopPanel.classList.remove('open'); panelOverlay.classList.remove('active'); };
    document.getElementById('closeBuffsPanel').onclick = () => { buffsPanel.classList.remove('open'); panelOverlay.classList.remove('active'); };
    panelOverlay.onclick = closeAllPanels;

    let balance = parseInt(localStorage.getItem('cb10')) || 100;
    let bestWin = parseInt(localStorage.getItem('cbest10')) || 0;
    let clickPower = parseInt(localStorage.getItem('cpow10')) || 1;
    let upgradeCost = parseInt(localStorage.getItem('cupg10')) || 15;
    let loanAmount = parseInt(localStorage.getItem('cloan10')) || 0;
    let loanDeadline = parseInt(localStorage.getItem('cdead10')) || 0;
    let nextLoanAmount = parseInt(localStorage.getItem('nloan10')) || 200;
    let loanCount = parseInt(localStorage.getItem('lcount10')) || 0;
    let isSpinning = false;
    let autoIncomeRate = parseInt(localStorage.getItem('cauto10')) || 0;
    let autoIncomeCost = parseInt(localStorage.getItem('cautoCost10')) || 100;

    let minesHintActive = false;
    let freeUpgradesActive = false;
    let winMultiplier5x = false;
    let minesTabClicks = 0;
    let bestWinClicks = 0;
    let debugVisible = false;

    let streaks = { slots3: 0, slots5: 0, slots35: 0, redblack: 0, dice: 0, mines: 0 };

    let rbBet = 10;
    let diceBet = 10;
    let minesGameActive = false;
    let minesCleared = 0;
    let minesPrize = 0;
    let minesHistory = [];
    let currentMinesBoard = [];

    const allShopItems = [
      { id: 'stopCollectors', name: 'СТОП КОЛЛЕКТОРЫ!!!', desc: 'Добовление 20 минут к кредиту', cost: 2000, duration: 20*60*1000, type: 'freeze_loan' },
      { id: 'luckSlots', name: 'Везение (слоты)', desc: 'Шанс джекпота 30% на 1 минуту', cost: 500, duration: 60*1000, type: 'slots_luck' },
      { id: 'clover', name: 'Клевер', desc: 'Шанс в колесе/костях 30% на 1 минуту', cost: 500, duration: 60*1000, type: 'rb_dice_luck' },
      { id: 'sapper', name: 'Сапер', desc: 'Видит 5 правильных ходов в минах', cost: 400, duration: Infinity, type: 'sapper', uses: 5 },
      { id: 'cleanSlate', name: 'С чистого листа', desc: 'Сброс всего прогресса', cost: 1000000, duration: 0, type: 'reset' },
      { id: 'watch', name: 'Вахта', desc: '+10 к силе клика, блокирует игры на 2 минуты', cost: 1000, duration: 2*60*1000, type: 'watch' },
      { id: 'mechaHand', name: 'МЕХА-РУКА', desc: '+10 к автокликеру на минуту', cost: 1500, duration: 60*1000, type: 'mecha_hand' },
      { id: 'goodFriend', name: 'Хороший знакомый', desc: 'Бесплатные депы в слотах на 3 минуты', cost: 950, duration: 3*60*1000, type: 'free_slots' },
      { id: 'gift', name: 'Подарок', desc: 'Дает 10-10000 монет', cost: 0, duration: 0, type: 'gift', special: true, chance: 0.02 },
      { id: 'forgive', name: 'Понять и простить', desc: 'Погашает кредит с 50% скидкой', cost: 2000, duration: 0, type: 'forgive', special: true, chance: 0.02 },
      { id: 'godHelp', name: 'Божья помощь', desc: '+1-5 к силе клика', cost: 0, duration: 0, type: 'god_help', special: true, chance: 0.01 }
    ];

    let shopItems = JSON.parse(localStorage.getItem('shopItems10')) || [];
    let purchasedItems = JSON.parse(localStorage.getItem('purchased10')) || [];
    let shopRefreshTime = parseInt(localStorage.getItem('shopRefresh10')) || 0;
    let activeBuffs = JSON.parse(localStorage.getItem('buffs10')) || [];
    let sapperUsesLeft = parseInt(localStorage.getItem('sapper10')) || 0;
    let watchActive = false;

    function getAvailableShopItems() {
      const available = allShopItems.filter(item => {
        if (item.special) return Math.random() < item.chance;
        return true;
      });
      const items = [...available];
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items.slice(0, 3);
    }

    function refreshShop(paid = false) {
      if (paid) {
        if (balance < 1500) { alert('Нужно 1500$'); return false; }
        balance -= 1500;
      }
      shopItems = getAvailableShopItems();
      purchasedItems = [];
      shopRefreshTime = Date.now() + 60*60*1000;
      save();
      renderShop();
      updateUI();
      return true;
    }

    function renderShop() {
      const container = document.getElementById('shopItems');
      if (!container) return;
      container.innerHTML = '';
      shopItems.forEach(item => {
        const purchased = purchasedItems.includes(item.id);
        const div = document.createElement('div'); 
        div.className = 'shop-item' + (purchased ? ' purchased' : '');
        div.innerHTML = `
          <div class="shop-item-name" style="${item.id === 'cleanSlate' ? 'color: red;' : ''}">${item.name}</div>
          <div class="shop-item-desc">${item.desc}</div>
          <div class="shop-item-cost">${item.cost === 0 ? 'Бесплатно' : item.cost + '$'}</div>
          <button class="shop-item-btn" data-id="${item.id}" ${purchased ? 'disabled' : ''}>
            ${purchased ? 'Куплено' : 'Купить'}
          </button>
        `;
        if (!purchased) {
          div.querySelector('.shop-item-btn').onclick = () => buyShopItem(item.id);
        }
        container.appendChild(div);
      });
    }

    function buyShopItem(itemId) {
      if (purchasedItems.includes(itemId)) return;
      const item = allShopItems.find(i => i.id === itemId);
      if (!item) return;
      if (balance < item.cost) { alert('Недостаточно монет!'); return; }
      balance -= item.cost;
      purchasedItems.push(itemId);
      
      switch(item.type) {
        case 'freeze_loan': loanDeadline += item.duration; break;
        case 'slots_luck': activateBuff(item); break;
        case 'rb_dice_luck': activateBuff(item); break;
        case 'sapper': sapperUsesLeft += item.uses; break;
        case 'reset': resetGame(); break;
        case 'watch': activateBuff(item); break;
        case 'mecha_hand': activateBuff(item); break;
        case 'free_slots': activateBuff(item); break;
        case 'gift': balance += Math.floor(Math.random() * 9991) + 10; break;
        case 'forgive':
          if (loanAmount > 0) {
            const halfDue = Math.floor(loanAmount * (1 + getLoanInterest()/100) * 0.5);
            if (balance >= halfDue) { balance -= halfDue; loanAmount = 0; loanDeadline = 0; }
            else { alert('Не хватает на погашение!'); balance += item.cost; }
          }
          break;
        case 'god_help': clickPower += Math.floor(Math.random() * 5) + 1; break;
      }
      save();
      renderShop();
      updateUI();
    }

    function activateBuff(item) {
      const existing = activeBuffs.find(b => b.id === item.id);
      if (existing) {
        if (item.type === 'sapper') {
          sapperUsesLeft += item.uses;
          save();
          renderBuffs();
          return;
        } else {
          existing.endTime += item.duration;
        }
      } else {
        activeBuffs.push({ id: item.id, name: item.name, type: item.type, endTime: Date.now() + item.duration });
      }
      save();
      renderBuffs();
      applyBuffs();
    }

    function applyBuffs() {
      const now = Date.now();
      activeBuffs = activeBuffs.filter(buff => buff.endTime > now);
      
      const watchBuff = activeBuffs.find(b => b.type === 'watch');
      watchActive = !!watchBuff;
      if (watchActive) disableGameButtons();
      else enableGameButtons();
      
      save();
    }

    function hasBuff(type) {
      return activeBuffs.some(b => b.type === type && b.endTime > Date.now());
    }

    function getEffectiveClickPower() {
      return clickPower + (hasBuff('watch') ? 10 : 0);
    }

    function getEffectiveAutoRate() {
      return autoIncomeRate + (hasBuff('mecha_hand') ? 10 : 0);
    }

    function renderBuffs() {
      const container = document.getElementById('buffsContent');
      if (!container) return;
      const now = Date.now();
      activeBuffs = activeBuffs.filter(buff => buff.endTime > now);
      
      let html = '';
      activeBuffs.forEach(buff => {
        const remaining = Math.max(0, buff.endTime - now);
        const minutes = Math.floor(remaining / 60000);
        const seconds = Math.floor((remaining % 60000) / 1000);
        html += `<div class="buff-item">
          <div style="font-weight: 700;">${buff.name}</div>
          <div class="buff-timer">${minutes}:${seconds.toString().padStart(2, '0')}</div>
        </div>`;
      });
      if (sapperUsesLeft > 0) {
        html += `<div class="buff-item">
          <div style="font-weight: 700;">Сапёр</div>
          <div class="buff-timer">Осталось: ${sapperUsesLeft} ходов</div>
        </div>`;
      }
      if (html === '') {
        html = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">Баффов нету, загляни в магазин</div>';
      }
      container.innerHTML = html;
      save();
    }

    function updateShopTimer() {
      const timer = document.getElementById('shopTimer');
      if (!timer) return;
      const remaining = Math.max(0, shopRefreshTime - Date.now());
      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      timer.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function makeBetEditable(displayId, betVar, minBet) {
      const display = document.getElementById(displayId);
      const value = display.textContent.replace('$', '');
      const input = document.createElement('input');
      input.type = 'number'; input.className = 'bet-input'; input.min = minBet;
      input.value = value;
      display.innerHTML = ''; display.appendChild(input);
      input.focus();
      input.addEventListener('blur', () => {
        let val = parseInt(input.value) || minBet;
        if (val < minBet) val = minBet;
        if (val > balance) val = balance;
        eval(`${betVar} = ${val}`);
        display.innerHTML = val + '$';
      });
      input.addEventListener('keypress', (e) => { if (e.key === 'Enter') input.blur(); });
    }

    function resetGame() {
      balance = 100; bestWin = 0; clickPower = 1; upgradeCost = 15;
      loanAmount = 0; loanDeadline = 0; nextLoanAmount = 200; loanCount = 0;
      autoIncomeRate = 0; autoIncomeCost = 100;
      activeBuffs = []; sapperUsesLeft = 0; watchActive = false;
      purchasedItems = [];
      shopItems = getAvailableShopItems();
      shopRefreshTime = Date.now() + 60*60*1000;
      Object.keys(streaks).forEach(k => streaks[k] = 0);
      enableGameButtons();
      updateUI();
      renderShop();
      renderBuffs();
    }

    const icons3 = ['🍒','🍓','🍌','🍎','🍋','🥭','💎','🍇','🍊'];

    function checkWin35Lines(grid) {
      const winCells = new Set();
      let totalWin = 0;
      
      for (let r = 0; r < 3; r++) {
        if (grid[r][0] === grid[r][1] && grid[r][1] === grid[r][2] && grid[r][2] === grid[r][3] && grid[r][3] === grid[r][4]) {
          totalWin += (winTable[grid[r][0]] || 20) * 2;
          for (let c = 0; c < 5; c++) winCells.add(`slot35-${r}-${c}`);
        }
        else if (grid[r][0] === grid[r][1] && grid[r][1] === grid[r][2] && grid[r][2] === grid[r][3]) {
          totalWin += (winTable[grid[r][0]] || 20) * 1.2;
          winCells.add(`slot35-${r}-0`); winCells.add(`slot35-${r}-1`); winCells.add(`slot35-${r}-2`); winCells.add(`slot35-${r}-3`);
        }
        else if (grid[r][1] === grid[r][2] && grid[r][2] === grid[r][3] && grid[r][3] === grid[r][4]) {
          totalWin += (winTable[grid[r][1]] || 20) * 1.2;
          winCells.add(`slot35-${r}-1`); winCells.add(`slot35-${r}-2`); winCells.add(`slot35-${r}-3`); winCells.add(`slot35-${r}-4`);
        }
        else if (grid[r][0] === grid[r][1] && grid[r][1] === grid[r][2]) {
          totalWin += (winTable[grid[r][0]] || 20) * 0.5;
          winCells.add(`slot35-${r}-0`); winCells.add(`slot35-${r}-1`); winCells.add(`slot35-${r}-2`);
        }
        else if (grid[r][1] === grid[r][2] && grid[r][2] === grid[r][3]) {
          totalWin += (winTable[grid[r][1]] || 20) * 0.5;
          winCells.add(`slot35-${r}-1`); winCells.add(`slot35-${r}-2`); winCells.add(`slot35-${r}-3`);
        }
        else if (grid[r][2] === grid[r][3] && grid[r][3] === grid[r][4]) {
          totalWin += (winTable[grid[r][2]] || 20) * 0.5;
          winCells.add(`slot35-${r}-2`); winCells.add(`slot35-${r}-3`); winCells.add(`slot35-${r}-4`);
        }
      }
      
      for (let c = 0; c < 5; c++) {
        if (grid[0][c] === grid[1][c] && grid[1][c] === grid[2][c]) {
          totalWin += (winTable[grid[0][c]] || 20) * 1.5;
          winCells.add(`slot35-0-${c}`); winCells.add(`slot35-1-${c}`); winCells.add(`slot35-2-${c}`);
        }
      }
      
      if (grid[0][0] === grid[1][1] && grid[1][1] === grid[2][2]) {
        totalWin += (winTable[grid[0][0]] || 20) * 2;
        winCells.add('slot35-0-0'); winCells.add('slot35-1-1'); winCells.add('slot35-2-2');
      }
      if (grid[0][1] === grid[1][2] && grid[1][2] === grid[2][3]) {
        totalWin += (winTable[grid[0][1]] || 20) * 2;
        winCells.add('slot35-0-1'); winCells.add('slot35-1-2'); winCells.add('slot35-2-3');
      }
      if (grid[0][2] === grid[1][3] && grid[1][3] === grid[2][4]) {
        totalWin += (winTable[grid[0][2]] || 20) * 2;
        winCells.add('slot35-0-2'); winCells.add('slot35-1-3'); winCells.add('slot35-2-4');
      }
      if (grid[0][4] === grid[1][3] && grid[1][3] === grid[2][2]) {
        totalWin += (winTable[grid[0][4]] || 20) * 2;
        winCells.add('slot35-0-4'); winCells.add('slot35-1-3'); winCells.add('slot35-2-2');
      }
      if (grid[0][3] === grid[1][2] && grid[1][2] === grid[2][1]) {
        totalWin += (winTable[grid[0][3]] || 20) * 2;
        winCells.add('slot35-0-3'); winCells.add('slot35-1-2'); winCells.add('slot35-2-1');
      }
      if (grid[0][2] === grid[1][1] && grid[1][1] === grid[2][0]) {
        totalWin += (winTable[grid[0][2]] || 20) * 2;
        winCells.add('slot35-0-2'); winCells.add('slot35-1-1'); winCells.add('slot35-2-0');
      }
      
      return { totalWin, winCells };
    }

    function renderMinesColumn() {
      const mc = document.getElementById('minesColumn');
      mc.innerHTML = '<div class="start-cell-mines">🏁</div>';
      minesHistory.forEach(cell => {
        const d = document.createElement('div'); d.className = 'mine-history-cell';
        d.textContent = cell==='mine'?'🧨':'✅';
        d.style.background = cell==='mine'?'var(--mine-mine)':'var(--mine-safe)';
        mc.appendChild(d);
      });
      if (minesGameActive) {
        const cc = document.createElement('div'); cc.className = 'mine-choices';
        currentMinesBoard.forEach((cell, idx) => {
          const btn = document.createElement('div'); btn.className = 'mine-choice-btn'; btn.textContent = '?';
          if ((minesHintActive || sapperUsesLeft > 0) && cell=='safe') btn.classList.add('highlight');
          btn.onclick = () => revealMineCell(idx);
          cc.appendChild(btn);
        });
        mc.appendChild(cc);
      }
      mc.scrollLeft = mc.scrollWidth;
    }

    function revealMineCell(idx) {
      if (!minesGameActive || isSpinning) return;
      if (currentMinesBoard[idx]=='mine') {
        minesHistory.push('mine'); minesGameActive = false;
        setMessageElement(document.getElementById('msgMines'), '💥 Взрыв!', 'loss'); handleStreak('mines', false);
      } else {
        minesHistory.push('safe'); minesCleared++; minesPrize += 5;
        document.getElementById('minesCleared').textContent = minesCleared;
        document.getElementById('minesPrize').textContent = minesPrize;
        currentMinesBoard = generateMineBoard();
        if (sapperUsesLeft > 0) {
          sapperUsesLeft--;
          save();
        }
      }
      renderMinesColumn();
    }

    cashOutMinesBtn.onclick = () => {
      if (isSpinning) return;
      if (minesGameActive) {
        if (minesPrize > 0) {
          addBalance(minesPrize);
          handleStreak('mines', true);
        }
        minesGameActive = false; minesCleared = 0; minesPrize = 0; minesHistory = [];
        document.getElementById('minesCleared').textContent = '0'; document.getElementById('minesPrize').textContent = '0';
        renderMinesColumn();
      } else {
        if (!spend(20)) { alert('Нужно 20$'); return; }
        minesGameActive = true; minesCleared = 0; minesPrize = 0; minesHistory = [];
        currentMinesBoard = generateMineBoard();
        document.getElementById('minesCleared').textContent = '0'; document.getElementById('minesPrize').textContent = '0';
        renderMinesColumn();
      }
    };

    document.querySelectorAll('.panel-game-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.panel-game-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
      };
    });

    function handleMinesTabClick() {
      minesTabClicks++;
      if (minesTabClicks >= 10 && !debugVisible) {
        debugVisible = true;
        debugToggleBtn.style.display = 'flex';
        minesTabClicks = 0;
      }
    }
    document.getElementById('minesTabPanel').addEventListener('click', handleMinesTabClick);
    
    document.getElementById('bestWinBox').addEventListener('click', () => {
      bestWinClicks++;
      if (bestWinClicks >= 10 && !debugVisible) {
        debugVisible = true;
        debugToggleBtn.style.display = 'flex';
        bestWinClicks = 0;
      }
    });

    function updateDebugButtons() {
      document.getElementById('toggleMinesHint').classList.toggle('active', minesHintActive);
      document.getElementById('toggleFreeUpgrades').classList.toggle('active', freeUpgradesActive);
      document.getElementById('toggle5xWin').classList.toggle('active', winMultiplier5x);
    }

    document.getElementById('toggleMinesHint').onclick = function() { 
      minesHintActive = !minesHintActive; 
      this.classList.toggle('active', minesHintActive); 
      if(minesGameActive) renderMinesColumn(); 
    };
    
    document.getElementById('toggleFreeUpgrades').onclick = function() { 
      freeUpgradesActive = !freeUpgradesActive; 
      this.classList.toggle('active', freeUpgradesActive); 
    };
    
    document.getElementById('toggle5xWin').onclick = function() { 
      winMultiplier5x = !winMultiplier5x; 
      this.classList.toggle('active', winMultiplier5x); 
    };
    
    document.getElementById('resetData').onclick = resetGame;

    document.getElementById('refreshShop').onclick = () => refreshShop(true);

    function fillReels(id, count) {
      const c = document.getElementById(id);
      if (!c) return;
      c.innerHTML = '';
      for(let i=0;i<count;i++) {
        const d = document.createElement('div'); d.className = 'slot-icon'; d.textContent = '🍒'; c.appendChild(d);
      }
    }

    if (!shopRefreshTime || shopRefreshTime < Date.now()) {
      if (!shopItems.length) {
        shopItems = getAvailableShopItems();
        purchasedItems = [];
        shopRefreshTime = Date.now() + 60*60*1000;
      }
    }

    fillReels('reels3',3);
    fillReels('reels5',5);
    buildGrid35();
    renderMinesColumn();
    updateUI();
    updateRbDisplay();
    updateDiceDisplay();
    renderShop();
    renderBuffs();
    updateDebugButtons();
    applyBuffs();

    setInterval(() => { 
      updateShopTimer(); 
      renderBuffs(); 
      applyBuffs();
      updateLoanTimer();
    }, 1000);
  })();
</script>
</body>
</html>
