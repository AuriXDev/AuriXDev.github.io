<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lume | Casino Game</title>
  <style>
    :root {
      --toxic: #00ff64;
      --toxic-dim: #00cc50;
      --toxic-glow: rgba(0, 255, 100, 0.3);
      --toxic-glow-strong: rgba(0, 255, 100, 0.6);
      --gold: #ffd700;
      --gold-glow: rgba(255, 215, 0, 0.4);
      --loss-red: #ff0040;
      --loss-red-glow: rgba(255, 0, 64, 0.5);
      --transition-speed: 0.4s;
      --wheel-red: #c0392b;
      --wheel-black: #1e272e;
    }

    [data-theme="dark"] {
      --bg-primary: #050505;
      --bg-secondary: #0f0f0f;
      --bg-card: rgba(20, 20, 20, 0.8);
      --bg-card-solid: #141414;
      --bg-input: #1a1a1a;
      --bg-tab: #1a1a1a;
      --bg-tab-active: var(--toxic);
      --text-primary: var(--toxic);
      --text-secondary: #00cc50;
      --text-muted: #444;
      --text-on-active: #000;
      --border-color: rgba(0, 255, 100, 0.15);
      --border-active: var(--toxic);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.6);
      --shadow-neon: 0 0 10px var(--toxic-glow), 0 0 30px rgba(0, 255, 100, 0.1);
      --slot-bg: #111;
      --slot-border: #333;
      --mine-safe: #1a3322;
      --mine-mine: #331111;
      --scrollbar-track: #111;
      --scrollbar-thumb: #333;
      --wheel-segment1: var(--wheel-red);
      --wheel-segment2: var(--wheel-black);
      --rb-red-bg: linear-gradient(135deg, #e74c3c, #c0392b);
      --rb-black-bg: linear-gradient(135deg, #2c3e50, #1a1a2e);
    }

    [data-theme="light"] {
      --bg-primary: #f0f0f0;
      --bg-secondary: #e8e8e8;
      --bg-card: rgba(255, 255, 255, 0.95);
      --bg-card-solid: #ffffff;
      --bg-input: #e0e0e0;
      --bg-tab: #e0e0e0;
      --bg-tab-active: var(--toxic);
      --text-primary: #00b848;
      --text-secondary: #009938;
      --text-muted: #888;
      --text-on-active: #000;
      --border-color: rgba(0, 180, 70, 0.2);
      --border-active: #00cc50;
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.1);
      --shadow-neon: 0 0 10px rgba(0, 255, 100, 0.2), 0 0 30px rgba(0, 255, 100, 0.05);
      --slot-bg: #f5f5f5;
      --slot-border: #ccc;
      --mine-safe: #d4edda;
      --mine-mine: #f8d7da;
      --scrollbar-track: #ddd;
      --scrollbar-thumb: #bbb;
      --wheel-segment1: #e74c3c;
      --wheel-segment2: #2c3e50;
      --rb-red-bg: linear-gradient(135deg, #ff6b6b, #e74c3c);
      --rb-black-bg: linear-gradient(135deg, #34495e, #2c3e50);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: manipulation;
      transition: background var(--transition-speed) ease;
    }

    .casino-phone {
      width: 100%;
      max-width: 460px;
      height: 100vh;
      max-height: 920px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      padding: 16px 14px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border-color);
      overflow: hidden;
      position: relative;
      transition: all var(--transition-speed) ease;
    }

    @media (min-width: 500px) {
      .casino-phone {
        border-radius: 36px;
        height: 96vh;
        border: 1.5px solid var(--border-color);
      }
      .casino-phone::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 37px;
        padding: 1.5px;
        background: linear-gradient(135deg, var(--toxic-glow-strong), transparent 50%, var(--toxic-glow));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        opacity: 0.5;
        z-index: 10;
      }
    }

    .casino-phone::-webkit-scrollbar { width: 4px; }
    .casino-phone::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    .casino-phone::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }

    .game-scroll-area {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding-right: 4px;
    }

    .game-scroll-area::-webkit-scrollbar { width: 3px; }
    .game-scroll-area::-webkit-scrollbar-track { background: transparent; }
    .game-scroll-area::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 110px;
      gap: 10px;
      flex-shrink: 0;
      position: relative;
    }

    .balance-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 30px;
      padding: 10px 16px;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--gold);
      font-family: 'JetBrains Mono', monospace;
      backdrop-filter: blur(10px);
      flex: 1;
      text-align: center;
    }

    .record-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 8px 14px;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--text-primary);
      backdrop-filter: blur(10px);
      white-space: nowrap;
      position: relative;
      z-index: 10;
    }

    /* ===== SIDE PANELS ===== */
    .side-toggle {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 64px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 0 14px 14px 0;
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      z-index: 50;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .side-toggle:hover {
      box-shadow: 0 0 12px var(--toxic-glow);
    }

    .side-toggle.left-toggle {
      left: -2px;
      border-radius: 0 14px 14px 0;
    }

    .side-toggle.right-toggle {
      right: -2px;
      border-radius: 14px 0 0 14px;
    }

    .side-panel-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .side-panel-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .side-panel {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 260px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      z-index: 70;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .side-panel.left-panel {
      left: 0;
      transform: translateX(-100%);
      border-radius: 0 20px 20px 0;
      border-left: none;
    }

    .side-panel.left-panel.open {
      transform: translateX(0);
    }

    .side-panel.right-panel {
      right: 0;
      transform: translateX(100%);
      border-radius: 20px 0 0 20px;
      border-right: none;
    }

    .side-panel.right-panel.open {
      transform: translateX(0);
    }

    .side-panel-header {
      padding: 16px;
      font-weight: 800;
      font-size: 1rem;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .side-panel-content {
      padding: 12px;
      flex: 1;
    }

    /* Theme toggle & Home button in right panel header */
    .panel-header-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .theme-toggle-panel,
    .home-btn-panel {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      text-decoration: none;
      font-weight: 700;
    }

    .theme-toggle-panel:hover,
    .home-btn-panel:hover {
      border-color: var(--toxic);
    }

    /* Left panel game tabs */
    .panel-game-tab {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: 14px;
      font-weight: 700;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      text-align: left;
    }

    .panel-game-tab:hover {
      border-color: var(--toxic);
      background: rgba(0, 255, 100, 0.05);
    }

    .panel-game-tab.active {
      background: var(--toxic);
      color: #000;
      border-color: var(--toxic);
      box-shadow: 0 0 12px var(--toxic-glow);
    }

    /* Right panel sections */
    .right-section {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .right-section-title {
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .right-btn {
      width: 100%;
      padding: 10px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      margin-bottom: 5px;
    }

    .right-btn:last-child {
      margin-bottom: 0;
    }

    .right-btn:active {
      transform: scale(0.97);
    }

    .right-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .right-btn.work-btn {
      background: linear-gradient(135deg, var(--toxic), var(--toxic-dim));
      color: #000;
    }

    .right-btn.work-btn:hover:not(:disabled) {
      box-shadow: 0 0 12px var(--toxic-glow);
    }

    .right-btn.upgrade-btn-r {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .right-btn.upgrade-btn-r:hover:not(:disabled) {
      border-color: var(--toxic);
      box-shadow: 0 0 8px var(--toxic-glow);
    }

    .right-btn.loan-btn-r {
      background: linear-gradient(135deg, var(--gold), #ccac00);
      color: #000;
    }

    .right-btn.loan-btn-r:hover:not(:disabled) {
      box-shadow: 0 0 12px var(--gold-glow);
    }

    .right-btn.repay-btn-r {
      background: linear-gradient(135deg, var(--toxic-dim), var(--toxic));
      color: #000;
    }

    .right-btn.auto-btn {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
    }

    .right-btn.auto-btn:hover:not(:disabled) {
      box-shadow: 0 0 12px rgba(108, 92, 231, 0.4);
    }

    .right-timer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-primary);
      opacity: 0.8;
      margin-top: 4px;
    }

    .right-info {
      font-size: 0.75rem;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .right-info .gold-text {
      color: var(--gold);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ===== TABS ===== */
    .game-tabs {
      display: none;
      gap: 5px;
      margin: 6px 0 12px;
      background: var(--bg-input);
      border-radius: 20px;
      padding: 5px;
      flex-wrap: wrap;
      border: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    @media (max-width: 500px) {
      .game-tabs { display: flex; }
    }

    .game-tab {
      flex: 1;
      text-align: center;
      padding: 8px 3px;
      border-radius: 16px;
      font-weight: 700;
      background: transparent;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.68rem;
      min-width: fit-content;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    .game-tab.active {
      background: var(--bg-tab-active);
      color: var(--text-on-active);
      box-shadow: 0 0 15px var(--toxic-glow);
    }

    .game-tab:not(.active):hover {
      background: rgba(0, 255, 100, 0.08);
    }

    /* ===== GAME PANELS ===== */
    .game-panel {
      display: none;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 12px;
      animation: panelFadeIn 0.3s ease;
      padding: 0 8px;
    }

    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .game-panel.active {
      display: flex;
    }

    .slot-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
      flex-wrap: wrap;
    }

    #reels35grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      margin: 12px 0;
    }

    .slot-icon {
      width: 52px;
      height: 62px;
      background: var(--slot-bg);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 2px solid var(--slot-border);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .slot-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .slot-icon.win-highlight {
      border-color: var(--toxic) !important;
      box-shadow: 0 0 18px var(--toxic), 0 0 40px var(--toxic-glow-strong);
      animation: neonPulse 0.5s ease-in-out 3;
    }

    @keyframes neonPulse {
      0%, 100% { box-shadow: 0 0 18px var(--toxic), 0 0 40px var(--toxic-glow); }
      50% { box-shadow: 0 0 35px var(--toxic), 0 0 60px var(--toxic-glow-strong); }
    }

    .slot-icon.spinning {
      animation: slotShake 0.08s infinite;
    }

    @keyframes slotShake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* ===== BUTTONS ===== */
    .bet-btn {
      width: 100%;
      padding: 13px;
      background: var(--toxic);
      border: none;
      border-radius: 24px;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      color: #000;
      margin-top: 10px;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .bet-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      pointer-events: none;
    }

    .bet-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px var(--toxic-glow-strong), 0 4px 15px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .bet-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .bet-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    /* Bet controls */
    .bet-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 8px 0;
    }

    .bet-adj-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-input);
      border: 1.5px solid var(--border-color);
      color: var(--text-primary);
      font-size: 1.4rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .bet-adj-btn:hover:not(:disabled) {
      border-color: var(--toxic);
      box-shadow: 0 0 10px var(--toxic-glow);
    }

    .bet-adj-btn:active:not(:disabled) {
      transform: scale(0.9);
    }

    .bet-adj-btn:disabled {
      background: #222;
      border-color: #333;
      color: #555;
      cursor: not-allowed;
    }

    .bet-display {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 8px 16px;
      color: var(--gold);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 1rem;
      min-width: 80px;
      text-align: center;
    }

    /* ===== WHEEL ===== */
    .wheel-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      margin: 14px 0;
    }

    .wheel {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: conic-gradient(
        var(--wheel-segment1) 0deg 45deg, var(--wheel-segment2) 45deg 90deg,
        var(--wheel-segment1) 90deg 135deg, var(--wheel-segment2) 135deg 180deg,
        var(--wheel-segment1) 180deg 225deg, var(--wheel-segment2) 225deg 270deg,
        var(--wheel-segment1) 270deg 315deg, var(--wheel-segment2) 315deg 360deg
      );
      border: 5px solid var(--gold);
      box-shadow: 0 0 20px var(--gold-glow);
      transition: transform 0.3s ease-out;
    }

    .arrow {
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      color: var(--gold);
      filter: drop-shadow(0 0 6px var(--gold-glow));
      z-index: 10;
      pointer-events: none;
    }

    .color-area {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 14px 0;
    }

    .color-card {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      border: 3px solid transparent;
      color: white;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .color-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
      pointer-events: none;
      border-radius: 19px;
    }

    .color-card:hover:not(:disabled) {
      transform: scale(1.06);
    }

    .color-card:active:not(:disabled) {
      transform: scale(0.96);
    }

    .color-card:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .color-card.red-card {
      background: var(--rb-red-bg);
      box-shadow: 0 4px 15px rgba(192, 57, 43, 0.5);
    }

    .color-card.red-card:hover:not(:disabled) {
      box-shadow: 0 6px 25px rgba(192, 57, 43, 0.7);
    }

    .color-card.black-card {
      background: var(--rb-black-bg);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      border-color: #555;
    }

    .color-card.black-card:hover:not(:disabled) {
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.6);
      border-color: #888;
    }

    /* ===== MESSAGES ===== */
    .message {
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
      margin: 8px 0;
      min-height: 28px;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    .message.win {
      color: var(--toxic) !important;
    }

    .message.loss {
      color: var(--loss-red) !important;
    }

    .streak-badge {
      background: linear-gradient(135deg, var(--toxic), var(--toxic-dim));
      color: #000;
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 0.8rem;
      display: inline-block;
      margin: 4px 0;
      box-shadow: 0 0 12px var(--toxic-glow);
    }

    /* ===== DICE ===== */
    .dice-container {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin: 20px 0;
    }

    .dice-scene {
      perspective: 400px;
      width: 80px;
      height: 80px;
    }

    .cube {
      width: 80px;
      height: 80px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 2s cubic-bezier(0.25, 0.1, 0.15, 1);
    }

    .face {
      position: absolute;
      width: 80px;
      height: 80px;
      background: var(--bg-card-solid);
      border: 2px solid var(--toxic-dim);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      color: var(--toxic);
      backface-visibility: hidden;
      box-shadow: 0 0 8px var(--toxic-glow);
    }

    .front  { transform: translateZ(40px); }
    .back   { transform: rotateY(180deg) translateZ(40px); }
    .right  { transform: rotateY(90deg) translateZ(40px); }
    .left   { transform: rotateY(-90deg) translateZ(40px); }

    .debug-panel {

      position: fixed;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.92);

    }

    .debug-toggle.active {

      color: #000;
      border-color: var(--toxic);

    .debug-toggle.hide-btn {

    /* ===== AUTO INCOME ===== */

    /* ===== RESPONSIVE ===== */

      .slot-icon { width: 46px; height: 56px; font-size: 24px; }
      .balance-box { font-size: 1rem; padding: 8px 12px; }
    }
  </style>
</head>

<script>
  (function() {
    // Theme toggle
    const htmlEl = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');
    let currentTheme = localStorage.getItem('ct10') || 'dark';
    
    function applyTheme(theme) {
      currentTheme = theme;
      htmlEl.setAttribute('data-theme', theme);
      themeBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('ct10', theme);
    }
    applyTheme(currentTheme);
    
    themeBtn.onclick = () => {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    };

    // Side panels
    const leftPanel = document.getElementById('leftPanel');
    const rightPanel = document.getElementById('rightPanel');
    const panelOverlay = document.getElementById('panelOverlay');
    const leftToggle = document.getElementById('leftToggle');
    const rightToggle = document.getElementById('rightToggle');

    function closePanels() {
      leftPanel.classList.remove('open');
      rightPanel.classList.remove('open');
      panelOverlay.classList.remove('active');
      leftToggle.textContent = '▶';
      rightToggle.textContent = '◀';
    }

    leftToggle.onclick = () => {
      if (leftPanel.classList.contains('open')) {
        closePanels();
      } else {
        closePanels();
        leftPanel.classList.add('open');
        panelOverlay.classList.add('active');
        leftToggle.textContent = '◀';
      }
    };

    rightToggle.onclick = () => {
      if (rightPanel.classList.contains('open')) {
        closePanels();
      } else {
        closePanels();
        rightPanel.classList.add('open');
        panelOverlay.classList.add('active');
        rightToggle.textContent = '▶';
      }
    };

    panelOverlay.onclick = closePanels;

    // Game state
    let balance = parseInt(localStorage.getItem('cb10')) || 100;
    let bestWin = parseInt(localStorage.getItem('cbest10')) || 0;
    let clickPower = parseInt(localStorage.getItem('cpow10')) || 1;
    let upgradeCost = parseInt(localStorage.getItem('cupg10')) || 15;
    let loanAmount = parseInt(localStorage.getItem('cloan10')) || 0;
    let loanDeadline = parseInt(localStorage.getItem('cdead10')) || 0;
    let nextLoanAmount = parseInt(localStorage.getItem('nloan10')) || 200;
    let loanCount = parseInt(localStorage.getItem('lcount10')) || 0;
    let isSpinning = false;
    let autoIncomeRate = parseInt(localStorage.getItem('cauto10')) || 0;
    let autoIncomeCost = parseInt(localStorage.getItem('cautoCost10')) || 100;

    let minesHintActive = false;
    let freeDepositActive = false;
    let freeUpgradesActive = false;
    let guaranteedWinActive = false;
    let winMultiplier5x = false;
    let slotJackpotActive = false;
    let minesTabClicks = 0;
    let bestWinClicks = 0;
    let debugVisible = false;

    let streaks = {
      slots3: 0, slots5: 0, slots35: 0,
      redblack: 0, dice: 0, mines: 0
    };

    // Bet amounts for RB and Dice
    let rbBet = 10;
    let diceBet = 10;

    let minesGameActive = false;
    let minesCleared = 0;
    let minesPrize = 0;
    let minesHistory = [];
    let currentMinesBoard = [];

    const icons3 = ['🍒','🍓','🍌','🍎','🍋','🥭','💎','🍇','🍊'];
    const icons5 = ['🍒','🍓','🍌','🍎','🍋','🥭','💎','🍇','🍊','🍑','🍉'];
    const winTable = {
      '🍒':70,'🍓':120,'🍌':23,'🍎':50,'🍋':60,'🥭':1488,'💎':10000,'🍇':100,'🍊':55,'🍑':150,'🍉':110
    };

    const balanceEl = document.getElementById('balance');
    const balanceRightEl = document.getElementById('balanceRight');
    const bestEl = document.getElementById('bestWin');
    const clickPowerEl = document.getElementById('clickPowerRight');
    const upgradeCostEl = document.getElementById('upgradeCostRight');
    const loanTimerEl = document.getElementById('loanTimerRight');
    const loanAmountDisplay = document.getElementById('loanAmountRight');
    const loanBonusEl = document.getElementById('loanBonusRight');
    const wheel = document.getElementById('wheel');
    const autoRateEl = document.getElementById('autoRate');
    const autoCostEl = document.getElementById('autoCost');
    const autoTotalEl = document.getElementById('autoTotal');

    // Ссылки на все игровые кнопки
    const spin3Btn = document.getElementById('spin3');
    const spin5Btn = document.getElementById('spin5');
    const spin35Btn = document.getElementById('spin35');
    const betRedBtn = document.getElementById('betRed');
    const betBlackBtn = document.getElementById('betBlack');
    const rbMinusBtn = document.getElementById('rbMinus');
    const rbPlusBtn = document.getElementById('rbPlus');
    const diceMinusBtn = document.getElementById('diceMinus');
    const dicePlusBtn = document.getElementById('dicePlus');
    const rollDiceBtn = document.getElementById('rollDice');
    const cashOutMinesBtn = document.getElementById('cashOutMines');
    const workClickBtn = document.getElementById('workClickRight');
    const upgradeClickBtn = document.getElementById('upgradeClickRight');
    const autoBuyBtn = document.getElementById('autoBuy');
    const takeLoanBtn = document.getElementById('takeLoanRight');
    const repayLoanBtn = document.getElementById('repayLoanRight');

    // Auto income interval
    let autoInterval = setInterval(() => {
      if (autoIncomeRate > 0) {
        balance += autoIncomeRate;
        if (balance > bestWin) bestWin = balance;
        updateUI();
      }
    }, 1000);

    function getLoanInterest() {
      return 10 + (loanCount * 5);
    }

    function save() {
      localStorage.setItem('cb10', balance);
      localStorage.setItem('cbest10', bestWin);
      localStorage.setItem('cpow10', clickPower);
      localStorage.setItem('cupg10', upgradeCost);
      localStorage.setItem('cloan10', loanAmount);
      localStorage.setItem('cdead10', loanDeadline);
      localStorage.setItem('nloan10', nextLoanAmount);
      localStorage.setItem('lcount10', loanCount);
      localStorage.setItem('cauto10', autoIncomeRate);
      localStorage.setItem('cautoCost10', autoIncomeCost);
    }

    function setMessageElement(el, text, type) {
      el.textContent = text;
      el.classList.remove('win', 'loss');
      if (type === 'win') el.classList.add('win');
      else if (type === 'loss') el.classList.add('loss');
    }

    function updateUI() {
      balanceEl.textContent = balance;
      balanceRightEl.textContent = balance;
      bestEl.textContent = bestWin;
      clickPowerEl.textContent = clickPower;
      upgradeCostEl.textContent = upgradeCost;
      loanAmountDisplay.textContent = nextLoanAmount;
      loanBonusEl.textContent = loanCount * 5;
      autoRateEl.textContent = autoIncomeRate;
      autoCostEl.textContent = autoIncomeCost;
      autoTotalEl.textContent = autoIncomeRate;
      if (loanAmount > 0 && Date.now() >= loanDeadline) {
        const due = Math.floor(loanAmount * (1 + getLoanInterest()/100));
        balance = Math.max(0, balance - due);
        loanAmount = 0; loanDeadline = 0;
      }
      updateLoanTimer();
      updateStreakDisplays();
      save();
    }

    function addBalance(amt) {
      const finalAmt = winMultiplier5x ? amt * 5 : amt;
      balance += finalAmt;
      if (balance > bestWin) bestWin = balance;
      updateUI();
    }

    function spend(amt) {
      if (freeDepositActive || freeUpgradesActive) return true;
      if (balance < amt) return false;
      balance -= amt;
      updateUI();
      return true;
    }

    function handleStreak(gameKey, isWin) {
      if (isWin) {
        streaks[gameKey]++;
        const bonus = (streaks[gameKey] - 1) * 5;
        if (bonus > 0) addBalance(bonus);
      } else {
        streaks[gameKey] = 0;
      }
      updateUI();
    }

    function updateStreakDisplays() {
      const keyMap = {
        slots3: 'streak3',
        slots5: 'streak5',
        slots35: 'streak35',
        redblack: 'streakRB',
        dice: 'streakDice',
        mines: 'streakMines'
      };
      Object.keys(streaks).forEach(key => {
        const elId = keyMap[key];
        const el = document.getElementById(elId);
        if (el) {
          el.innerHTML = streaks[key] > 1 ? `<span class="streak-badge">🔥 Стрик ×${streaks[key]}</span>` : '';
        }
      });
    }

    function updateLoanTimer() {
      if (loanAmount > 0) {
        const rem = Math.max(0, loanDeadline - Date.now());
        const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
        const totalDue = Math.floor(loanAmount * (1 + getLoanInterest()/100));
        loanTimerEl.textContent = `⏳ ${m}м ${s}с (долг ${loanAmount} +${getLoanInterest()}% = ${totalDue}$)`;
      } else {
        loanTimerEl.textContent = 'Нет кредита';
      }
    }
    setInterval(updateLoanTimer, 500);

    // Work / Upgrade (right panel)
    workClickBtn.onclick = () => { balance += clickPower; updateUI(); };
    upgradeClickBtn.onclick = () => {
      if (freeUpgradesActive) {
        clickPower++;
        upgradeCost = Math.floor(upgradeCost * 2);
        updateUI();
        return;
      }
      if (balance < upgradeCost) { alert('Нужно '+upgradeCost+'$'); return; }
      balance -= upgradeCost;
      clickPower++;
      upgradeCost = Math.floor(upgradeCost * 2);
      updateUI();
    };

    // Auto income
    autoBuyBtn.onclick = () => {
      if (balance < autoIncomeCost) { alert('Нужно '+autoIncomeCost+'$'); return; }
      balance -= autoIncomeCost;
      autoIncomeRate += 1;
      autoIncomeCost = Math.floor(autoIncomeCost * 1.5);
      updateUI();
    };

    // Credit
    takeLoanBtn.onclick = () => {
      if (loanAmount > 0) { alert('Уже есть кредит'); return; }
      loanAmount = nextLoanAmount;
      loanDeadline = Date.now() + 10*60*1000;
      balance += nextLoanAmount;
      updateUI();
    };
    repayLoanBtn.onclick = () => {
      if (loanAmount === 0) { alert('Нет кредита'); return; }
      if (freeUpgradesActive) {
        loanAmount = 0; loanDeadline = 0;
        nextLoanAmount = Math.floor(nextLoanAmount * 2);
        loanCount++;
        updateUI();
        return;
      }
      const totalDue = Math.floor(loanAmount * (1 + getLoanInterest()/100));
      if (balance < totalDue) { alert('Не хватает '+totalDue+'$'); return; }
      balance -= totalDue;
      loanAmount = 0; loanDeadline = 0;
      nextLoanAmount = Math.floor(nextLoanAmount * 2);
      loanCount++;
      updateUI();
    };

    function clearHighlights(containerId) {
      document.querySelectorAll(`#${containerId} .slot-icon`).forEach(el => el.classList.remove('win-highlight'));
    }

    // Блокировка кнопок во время анимации
    function disableGameButtons() {
      spin3Btn.disabled = true;
      spin5Btn.disabled = true;
      spin35Btn.disabled = true;
      betRedBtn.disabled = true;
      betBlackBtn.disabled = true;
      rollDiceBtn.disabled = true;
      if (cashOutMinesBtn) cashOutMinesBtn.disabled = true;
    }

    function enableGameButtons() {
      spin3Btn.disabled = false;
      spin5Btn.disabled = false;
      spin35Btn.disabled = false;
      betRedBtn.disabled = false;
      betBlackBtn.disabled = false;
      rollDiceBtn.disabled = false;
      if (cashOutMinesBtn) cashOutMinesBtn.disabled = false;
    }

    // SLOTS 3
    function animateSlots3(callback) {
      const reels = document.querySelectorAll('#reels3 .slot-icon');
      if (isSpinning) return;
      isSpinning = true;
      disableGameButtons();
      clearHighlights('reels3');
      let finalIcons;
      if (slotJackpotActive) {
        const ic = icons3[Math.floor(Math.random()*icons3.length)];
        finalIcons = [ic, ic, ic];
      } else {
        finalIcons = [icons3[Math.floor(Math.random()*icons3.length)], icons3[Math.floor(Math.random()*icons3.length)], icons3[Math.floor(Math.random()*icons3.length)]];
      }
      reels.forEach((reel, idx) => {
        reel.classList.add('spinning');
        let steps = 0;
        const interval = setInterval(() => {
          reel.textContent = icons3[Math.floor(Math.random()*icons3.length)];
          steps++;
          if (steps >= 10 + idx*5) {
            clearInterval(interval);
            reel.textContent = finalIcons[idx];
            reel.classList.remove('spinning');
            if (idx === 2) { 
              isSpinning = false; 
              enableGameButtons();
              callback(finalIcons); 
            }
          }
        }, 60);
      });
    }

    spin3Btn.onclick = () => {
      if (isSpinning) return;
      if (!spend(5)) { alert('Мало монет'); return; }
      animateSlots3(final => {
        const win = (final[0]===final[1] && final[1]===final[2]) ? (winTable[final[0]]||10) : 0;
        const msg = document.getElementById('msg3');
        if (win>0) {
          document.querySelectorAll('#reels3 .slot-icon').forEach(el => el.classList.add('win-highlight'));
          addBalance(win);
          setMessageElement(msg, `+${winMultiplier5x?win*5:win} 💎`, 'win');
          handleStreak('slots3', true);
        } else {
          setMessageElement(msg, 'Нет совпадений', 'loss');
          handleStreak('slots3', false);
        }
      });
    };

    // SLOTS 5
    function animateSlots5(callback) {
      const reels = document.querySelectorAll('#reels5 .slot-icon');
      if (isSpinning) return;
      isSpinning = true;
      disableGameButtons();
      clearHighlights('reels5');
      let finalIcons;
      if (slotJackpotActive) {
        const ic = icons5[Math.floor(Math.random()*icons5.length)];
        finalIcons = [ic, ic, ic, ic, ic];
      } else {
        finalIcons = Array.from({length:5}, ()=>icons5[Math.floor(Math.random()*icons5.length)]);
      }
      reels.forEach((reel, idx) => {
        reel.classList.add('spinning');
        let steps = 0;
        const interval = setInterval(() => {
          reel.textContent = icons5[Math.floor(Math.random()*icons5.length)];
          steps++;
          if (steps >= 10 + idx*5) {
            clearInterval(interval);
            reel.textContent = finalIcons[idx];
            reel.classList.remove('spinning');
            if (idx === 4) { 
              isSpinning = false; 
              enableGameButtons();
              callback(finalIcons); 
            }
          }
        }, 60);
      });
    }

    spin5Btn.onclick = () => {
      if (isSpinning) return;
      if (!spend(10)) { alert('Мало монет'); return; }
      animateSlots5(final => {
        let win = 0;
        const base = winTable[final[0]]||50;
        const reels = document.querySelectorAll('#reels5 .slot-icon');
        if (final[0]===final[1]&&final[1]===final[2]&&final[2]===final[3]&&final[3]===final[4]) {
          win = Math.floor(base*1.5); reels.forEach(el=>el.classList.add('win-highlight'));
        } else if ((final[0]===final[1]&&final[1]===final[2]&&final[2]===final[3])) {
          win = base; [0,1,2,3].forEach(i=>reels[i].classList.add('win-highlight'));
        } else if ((final[1]===final[2]&&final[2]===final[3]&&final[3]===final[4])) {
          win = base; [1,2,3,4].forEach(i=>reels[i].classList.add('win-highlight'));
        } else if (final[0]===final[1]&&final[1]===final[2]) {
          win = Math.floor(base*0.5); [0,1,2].forEach(i=>reels[i].classList.add('win-highlight'));
        } else if (final[1]===final[2]&&final[2]===final[3]) {
          win = Math.floor(base*0.5); [1,2,3].forEach(i=>reels[i].classList.add('win-highlight'));
        } else if (final[2]===final[3]&&final[3]===final[4]) {
          win = Math.floor(base*0.5); [2,3,4].forEach(i=>reels[i].classList.add('win-highlight'));
        }
        const msg = document.getElementById('msg5');
        if (win>0) {
          addBalance(win);
          setMessageElement(msg, `+${winMultiplier5x?win*5:win} 💎`, 'win');
          handleStreak('slots5', true);
        } else {
          setMessageElement(msg, 'Нет совпадений', 'loss');
          handleStreak('slots5', false);
        }
      });
    };

    // SLOTS 3x5
    function buildGrid35() {
      const grid = document.getElementById('reels35grid');
      grid.innerHTML = '';
      for (let r=0; r<3; r++) {
        const row = document.createElement('div');
        row.className = 'slot-row';
        for (let c=0; c<5; c++) {
          const icon = document.createElement('div');
          icon.className = 'slot-icon';
          icon.id = `slot35-${r}-${c}`;
          icon.textContent = '🍒';
          row.appendChild(icon);
        }
        grid.appendChild(row);
      }
    }

    spin35Btn.onclick = () => {
      if (isSpinning) return;
      if (!spend(15)) { alert('Нужно 15$'); return; }
      isSpinning = true;
      disableGameButtons();
      clearHighlights('reels35grid');
      let finalGrid = [];
      if (slotJackpotActive) {
        const winIcon = icons5[Math.floor(Math.random()*icons5.length)];
        for (let r=0; r<3; r++) { finalGrid[r] = []; for (let c=0; c<5; c++) finalGrid[r][c] = winIcon; }
      } else {
        for (let r=0; r<3; r++) { finalGrid[r] = []; for (let c=0; c<5; c++) finalGrid[r][c] = icons5[Math.floor(Math.random()*icons5.length)]; }
      }

      document.querySelectorAll('#reels35grid .slot-icon').forEach(icon => icon.classList.add('spinning'));

      [0,1,2,3,4].forEach((col, colIndex) => {
        setTimeout(() => {
          for (let row=0; row<3; row++) {
            const icon = document.getElementById(`slot35-${row}-${col}`);
            icon.textContent = finalGrid[row][col];
            icon.classList.remove('spinning');
          }
          if (colIndex === 4) {
            setTimeout(() => {
              let totalWin = 0;
              const winCells = new Set();
              for (let r=0; r<3; r++) {
                if (finalGrid[r][0]===finalGrid[r][1] && finalGrid[r][1]===finalGrid[r][2] && finalGrid[r][2]===finalGrid[r][3] && finalGrid[r][3]===finalGrid[r][4]) {
                  totalWin += (winTable[finalGrid[r][0]]||20)*2;
                  for (let c=0; c<5; c++) winCells.add(`slot35-${r}-${c}`);
                }
              }
              for (let c=0; c<5; c++) {
                if (finalGrid[0][c]===finalGrid[1][c] && finalGrid[1][c]===finalGrid[2][c]) {
                  totalWin += (winTable[finalGrid[0][c]]||20);
                  for (let r=0; r<3; r++) winCells.add(`slot35-${r}-${c}`);
                }
              }
              if (finalGrid[0][0]===finalGrid[1][1] && finalGrid[1][1]===finalGrid[2][2]) {
                totalWin += (winTable[finalGrid[0][0]]||20);
                winCells.add('slot35-0-0'); winCells.add('slot35-1-1'); winCells.add('slot35-2-2');
              }
              if (finalGrid[0][4]===finalGrid[1][3] && finalGrid[1][3]===finalGrid[2][2]) {
                totalWin += (winTable[finalGrid[0][4]]||20);
                winCells.add('slot35-0-4'); winCells.add('slot35-1-3'); winCells.add('slot35-2-2');
              }
              winCells.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('win-highlight'); });

              const msg = document.getElementById('msg35');
              if (totalWin > 0) {
                addBalance(totalWin);
                setMessageElement(msg, `+${winMultiplier5x?totalWin*5:totalWin} 💎`, 'win');
                handleStreak('slots35', true);
              } else {
                setMessageElement(msg, 'Нет совпадений', 'loss');
                handleStreak('slots35', false);
              }
              isSpinning = false;
              enableGameButtons();
            }, 200);
          }
        }, colIndex * 400);
      });
    };

    // RED/BLACK with adjustable bet
    function updateRbDisplay() {
      document.getElementById('rbBetDisplay').textContent = rbBet + '$';
    }

    rbMinusBtn.onclick = () => {
      if (isSpinning) return;
      if (rbBet > 10) { rbBet = Math.max(10, rbBet - 5); updateRbDisplay(); }
    };
    rbPlusBtn.onclick = () => {
      if (isSpinning) return;
      if (rbBet < balance) { rbBet += 5; updateRbDisplay(); }
    };

    betRedBtn.onclick = () => playRedBlack('red');
    betBlackBtn.onclick = () => playRedBlack('black');
    
    function playRedBlack(choice) {
      if (isSpinning) return;
      if (!spend(rbBet)) return;
      isSpinning = true;
      disableGameButtons();
      const msg = document.getElementById('msgRB');
      msg.textContent = 'Вращение...';
      msg.classList.remove('win','loss');
      const winRed = guaranteedWinActive ? (choice === 'red') : Math.random() < 0.48;
      const angle = winRed ? [22,112,202,292][Math.floor(Math.random()*4)] : [67,157,247,337][Math.floor(Math.random()*4)];
      wheel.style.transition = 'transform 1.8s cubic-bezier(0.25,0.1,0.15,1)';
      wheel.style.transform = `rotate(${5*360+angle}deg)`;
      setTimeout(() => {
        if (choice === (winRed ? 'red' : 'black')) {
          const winAmount = Math.floor(rbBet * 1.5);
          addBalance(winAmount);
          setMessageElement(msg, `+${winMultiplier5x?winAmount*5:winAmount}$`, 'win');
          handleStreak('redblack', true);
        } else {
          setMessageElement(msg, 'Проигрыш', 'loss');
          handleStreak('redblack', false);
        }
        isSpinning = false;
        enableGameButtons();
      }, 1900);
    }

    // DICE with adjustable bet
    function updateDiceDisplay() {
      document.getElementById('diceBetDisplay').textContent = diceBet + '$';
    }

    diceMinusBtn.onclick = () => {
      if (isSpinning) return;
      if (diceBet > 10) { diceBet = Math.max(10, diceBet - 5); updateDiceDisplay(); }
    };
    dicePlusBtn.onclick = () => {
      if (isSpinning) return;
      if (diceBet < balance) { diceBet += 5; updateDiceDisplay(); }
    };

    const cubeRotations = [
      'rotateX(0deg) rotateY(0deg)','rotateY(180deg)','rotateY(-90deg)','rotateY(90deg)','rotateX(-90deg)','rotateX(90deg)'
    ];
    rollDiceBtn.onclick = () => {
      if (isSpinning) return;
      if (!spend(diceBet)) { alert('Нужно '+diceBet+'$'); return; }
      isSpinning = true;
      disableGameButtons();
      let val1, val2;
      if (guaranteedWinActive) { val1 = Math.floor(Math.random()*6); val2 = val1; }
      else { val1 = Math.floor(Math.random()*6); val2 = Math.floor(Math.random()*6); }
      const extraSpins = 3 + Math.floor(Math.random()*3);
      document.getElementById('cube1').style.transform = `rotateX(${extraSpins*360}deg) rotateY(${extraSpins*360}deg) ${cubeRotations[val1]}`;
      document.getElementById('cube2').style.transform = `rotateX(${extraSpins*360}deg) rotateY(${extraSpins*360}deg) ${cubeRotations[val2]}`;
      setTimeout(() => {
        const msg = document.getElementById('msgDice');
        if (val1 === val2) {
          const winAmount = Math.floor(diceBet * 1.5);
          addBalance(winAmount);
          setMessageElement(msg, `Дубль! +${winMultiplier5x?winAmount*5:winAmount}$`, 'win');
          handleStreak('dice', true);
        } else {
          setMessageElement(msg, 'Нет дубля', 'loss');
          handleStreak('dice', false);
        }
        isSpinning = false;
        enableGameButtons();
      }, 2100);
    };

    // MINES
    function generateMineBoard() {
      const mineCount = minesCleared >= 10 ? 2 : 1;
      const board = Array(3).fill('safe');
      let placed = 0;
      while (placed < mineCount) {
        const r = Math.floor(Math.random()*3);
        if (board[r]==='safe') { board[r]='mine'; placed++; }
      }
      return board;
    }

    function renderMinesColumn() {
      const mc = document.getElementById('minesColumn');
      mc.innerHTML = '<div class="start-cell-mines">🏁</div>';
      minesHistory.forEach(cell => {
        const d = document.createElement('div'); d.className = 'mine-history-cell';
        d.textContent = cell==='mine'?'🧨':'✅';
        d.style.background = cell==='mine'?'var(--mine-mine)':'var(--mine-safe)';
        mc.appendChild(d);
      });
      if (minesGameActive) {
        const cc = document.createElement('div'); cc.className = 'mine-choices';
        currentMinesBoard.forEach((cell, idx) => {
          const btn = document.createElement('div'); btn.className = 'mine-choice-btn'; btn.textContent = '?';
          if (minesHintActive && cell==='safe') btn.classList.add('highlight');
          btn.onclick = () => revealMineCell(idx); cc.appendChild(btn);
        });
        mc.appendChild(cc);
      }
      mc.scrollLeft = mc.scrollWidth;
    }

    function revealMineCell(idx) {
      if (!minesGameActive || isSpinning) return;
      if (currentMinesBoard[idx]==='mine') {
        minesHistory.push('mine'); minesGameActive = false;
        setMessageElement(document.getElementById('msgMines'), '💥 Взрыв!', 'loss');
        handleStreak('mines', false);
      } else {
        minesHistory.push('safe'); minesCleared++; minesPrize += 5;
        document.getElementById('minesCleared').textContent = minesCleared;
        document.getElementById('minesPrize').textContent = minesPrize;
        currentMinesBoard = generateMineBoard();
      }
      renderMinesColumn();
    }

    cashOutMinesBtn.onclick = () => {
      if (isSpinning) return;
      if (minesGameActive) {
        addBalance(minesPrize);
        if (minesPrize > 0) handleStreak('mines', true);
        minesGameActive = false; minesCleared = 0; minesPrize = 0; minesHistory = [];
        document.getElementById('minesCleared').textContent = '0';
        document.getElementById('minesPrize').textContent = '0';
        renderMinesColumn();
      } else {
        if (!spend(20)) { alert('Нужно 20$'); return; }
        minesGameActive = true; minesCleared = 0; minesPrize = 0; minesHistory = [];
        currentMinesBoard = generateMineBoard();
        document.getElementById('minesCleared').textContent = '0';
        document.getElementById('minesPrize').textContent = '0';
        renderMinesColumn();
      }
    };

    // Panel game tabs
    document.querySelectorAll('.panel-game-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.panel-game-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
        const matchingBottom = document.querySelector(`.game-tab[data-tab="${tab.dataset.tab}"]`);
        if (matchingBottom) matchingBottom.classList.add('active');
        document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
        closePanels();
      };
    });

    // Bottom game tabs (mobile)
    document.querySelectorAll('.game-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.panel-game-tab').forEach(t => t.classList.remove('active'));
        const matchingPanel = document.querySelector(`.panel-game-tab[data-tab="${tab.dataset.tab}"]`);
        if (matchingPanel) matchingPanel.classList.add('active');
        document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(tab.dataset.tab).classList.add('active');
      };
    });

    // Mines tab counter (debug)
    function handleMinesTabClick() {
      minesTabClicks++;
      if (minesTabClicks >= 50 && !debugVisible) {
        debugVisible = true;
        document.getElementById('debugPanel').classList.add('visible');
        minesTabClicks = 0;
      }
    }
    document.getElementById('minesTab').addEventListener('click', handleMinesTabClick);
    document.getElementById('minesTabPanel').addEventListener('click', handleMinesTabClick);

    // Best win clicks for debug
    document.getElementById('bestWinBox').addEventListener('click', () => {
      bestWinClicks++;
      if (bestWinClicks >= 10 && !debugVisible) {
        debugVisible = true;
        document.getElementById('debugPanel').classList.add('visible');
        bestWinClicks = 0;
      }
    });

    // Debug
    document.getElementById('toggleMinesHint').onclick = function() { minesHintActive=!minesHintActive; this.classList.toggle('active',minesHintActive); if(minesGameActive)renderMinesColumn(); };
    document.getElementById('toggleFreeDeposit').onclick = function() { freeDepositActive=!freeDepositActive; this.classList.toggle('active',freeDepositActive); };
    document.getElementById('toggleFreeUpgrades').onclick = function() { freeUpgradesActive=!freeUpgradesActive; this.classList.toggle('active',freeUpgradesActive); };
    document.getElementById('toggleGuaranteedWin').onclick = function() { guaranteedWinActive=!guaranteedWinActive; this.classList.toggle('active',guaranteedWinActive); };
    document.getElementById('toggle5xWin').onclick = function() { winMultiplier5x=!winMultiplier5x; this.classList.toggle('active',winMultiplier5x); };
    document.getElementById('toggleSlotJackpot').onclick = function() { slotJackpotActive=!slotJackpotActive; this.classList.toggle('active',slotJackpotActive); };
    document.getElementById('hideDebug').onclick = function() { document.getElementById('debugPanel').classList.remove('visible'); debugVisible=false; bestWinClicks=0; };
    document.getElementById('resetData').onclick = function() {
      balance=100; bestWin=0; clickPower=1; upgradeCost=15;
      loanAmount=0; loanDeadline=0; nextLoanAmount=200; loanCount=0;
      autoIncomeRate=0; autoIncomeCost=100;
      Object.keys(streaks).forEach(k=>streaks[k]=0);
      updateUI();
    };

    function fillReels(id, count) {
      const c = document.getElementById(id);
      if (!c) return;
      c.innerHTML = '';
      for(let i=0;i<count;i++) {
        const d = document.createElement('div'); d.className = 'slot-icon'; d.textContent = '🍒'; c.appendChild(d);
      }
    }
    fillReels('reels3',3);
    fillReels('reels5',5);
    buildGrid35();
    renderMinesColumn();
    updateUI();
    updateRbDisplay();
    updateDiceDisplay();
  })();
</script>
</body>
</html>
